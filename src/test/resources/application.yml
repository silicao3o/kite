spring:
  application:
    name: docker-monitor-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  mail:
    host: localhost
    port: 25
    username: test
    password: test

docker:
  host: unix:///var/run/docker.sock
  monitor:
    log-tail-lines: 10
    server-name: Test-Server
    notification:
      email:
        to: test@example.com
        from: docker-monitor@test.com
    security:
      enabled: false

logging:
  level:
    root: WARN
    com.example.dockermonitor: DEBUG
