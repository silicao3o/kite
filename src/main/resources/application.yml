spring:
  application:
    name: docker-monitor

  web:
    resources:
      cache:
        cachecontrol:
          max-age: 3600        # CSS/JS 1시간 캐시
          must-revalidate: true

  thymeleaf:
    cache: true                # 운영환경 Thymeleaf 템플릿 캐시

  # 이메일 설정 (환경변수로 오버라이드 가능)
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
            required: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Docker 설정
docker:
  # Docker 소켓 경로 (Linux: unix:///var/run/docker.sock, Windows: tcp://localhost:2375)
  host: ${DOCKER_HOST:unix:///var/run/docker.sock}

  monitor:
    # 로그 가져올 줄 수
    log-tail-lines: ${LOG_TAIL_LINES:50}
    # 서버 식별 이름
    server-name: ${SERVER_NAME:Production-Server-01}

    # 메트릭 수집 설정
    metrics:
      # 메트릭 수집 활성화
      enabled: ${METRICS_ENABLED:true}
      # 메트릭 수집 주기 (초)
      collection-interval-seconds: ${METRICS_COLLECTION_INTERVAL:15}

    # 재연결 설정
    reconnect:
      # 초기 재연결 대기 시간 (밀리초)
      initial-delay-ms: ${RECONNECT_INITIAL_DELAY:5000}
      # 최대 재연결 대기 시간 (밀리초, 5분)
      max-delay-ms: ${RECONNECT_MAX_DELAY:300000}
      # 백오프 배수
      multiplier: ${RECONNECT_MULTIPLIER:2.0}
      # 최대 재시도 횟수 (0 = 무제한)
      max-retries: ${RECONNECT_MAX_RETRIES:10}

    # 알림 중복 방지 설정
    deduplication:
      # 중복 방지 활성화
      enabled: ${DEDUP_ENABLED:true}
      # 중복 방지 시간 창 (초) - 이 시간 내 동일 컨테이너/액션 알림 스킵
      window-seconds: ${DEDUP_WINDOW_SECONDS:60}

    # 컨테이너 필터링 설정
    filter:
      # 모니터링 제외할 컨테이너 이름 패턴 (정규식)
      exclude-names:
      # - ".*-temp"
      # - "test-.*"
      # 모니터링 제외할 이미지 이름 패턴 (정규식)
      exclude-images:
      # - "busybox.*"
      # - "alpine.*"
      # 모니터링할 컨테이너 이름 패턴 (정규식, 비어있으면 모두 포함)
      include-names: []
      # 모니터링할 이미지 이름 패턴 (정규식, 비어있으면 모두 포함)
      include-images: []

    notification:
      email:
        # 알림 받을 이메일 (쉼표로 여러 명 지정 가능)
        to: ${ALERT_EMAIL}
        # 발신자 이메일
        from: ${MAIL_FROM}

    # 자가치유 설정
    self-healing:
      enabled: ${SELF_HEALING_ENABLED:true}
      reset-window-minutes: ${SELF_HEALING_RESET_WINDOW:30}
      rules:
        - name-pattern: "demo-*"
          max-restarts: 5
          restart-delay-seconds: 10
        - name-pattern: "test-*"
          max-restarts: 3
          restart-delay-seconds: 2
        - name-pattern: "web-*"
          max-restarts: 5
          restart-delay-seconds: 5

    # GHCR 이미지 자동 업데이트 설정
    image-watch:
      # 활성화 여부
      enabled: ${IMAGE_WATCH_ENABLED:false}
      # 폴링 주기 (초, 기본 5분)
      poll-interval-seconds: ${IMAGE_WATCH_INTERVAL:300}
      # GHCR 인증 토큰 (private 이미지용)
      ghcr-token: ${GHCR_TOKEN:}
      # 감시할 이미지 목록 (예시)
      watches: []
      # watches:
      #   - image: ghcr.io/myorg/myapp
      #     tag: latest
      #     container-pattern: "myapp-.*"
      #     max-unavailable: 1

    # 다중 노드 스케줄링 설정
    nodes:
      # 활성화 여부
      enabled: ${NODES_ENABLED:true}
      # Heartbeat 체크 주기 (초)
      heartbeat-interval-seconds: ${NODES_HEARTBEAT_INTERVAL:30}
      # 배치 전략: LEAST_USED | ROUND_ROBIN
      placement-strategy: ${NODES_PLACEMENT_STRATEGY:LEAST_USED}
      # 관리할 노드 목록
      nodes: []
      # 예시:
      # nodes:
      #   # GCP 내부망 노드 (TCP 직접 연결)
      #   - name: gcp-vm-1
      #     host: <GCP 내부 IP>
      #     port: 2375
      #     connection-type: TCP
      #
      #   # 온프레미스 노드 (SSH 터널 경유)
      #   - name: onprem-dev
      #     host: <온프레미스 공인 IP>
      #     port: 2375
      #     connection-type: SSH
      #     ssh-port: 22
      #     ssh-user: ubuntu
      #     ssh-key-path: /root/.ssh/id_rsa
    # Desired State 관리 설정
    desired-state:
      # 활성화 여부
      enabled: ${DESIRED_STATE_ENABLED:false}
      # Reconcile 주기 (초)
      reconcile-interval-seconds: ${DESIRED_STATE_INTERVAL:30}
      # 관리할 서비스 목록
      services: []
      # 예시:
      # services:
      #   - name: demo-api
      #     image: ghcr.io/myorg/demo-api:latest
      #     replicas: 2
      #     container-name-prefix: demo-api
      #     env:
      #       - "DB_HOST=postgres"
      #     ports:
      #       - "8081:8081"

    # Health Check Probe 설정
    health-check:
      # 활성화 여부
      enabled: ${HEALTH_CHECK_ENABLED:false}
      # 전체 probe 실행 주기 (초)
      period-seconds: ${HEALTH_CHECK_PERIOD:15}
      # 앱 시작 후 첫 probe 전 대기 (초)
      initial-delay-seconds: ${HEALTH_CHECK_INITIAL_DELAY:30}
      # 감시할 컨테이너/probe 목록
      probes: []
      # 예시:
      # probes:
      #   - container-pattern: "demo-api-.*"
      #     liveness:
      #       type: HTTP
      #       path: /actuator/health
      #       port: 8081
      #       initial-delay-seconds: 30
      #       period-seconds: 15
      #       failure-threshold: 3
      #     readiness:
      #       type: HTTP
      #       path: /actuator/health/readiness
      #       port: 8081
      #       failure-threshold: 3

    # AI 분석 설정
    ai:
      enabled: ${AI_ENABLED:false}
      provider: ${AI_PROVIDER:ANTHROPIC}
      anthropic-api-key: ${ANTHROPIC_API_KEY:}
      openai-api-key: ${OPENAI_API_KEY:}
      gemini-api-key: ${GEMINI_API_KEY:}
      timeout-seconds: ${AI_TIMEOUT:30}

    # JWT 인증 설정
    security:
      # JWT 인증 활성화 (기본: 비활성화)
      enabled: ${SECURITY_ENABLED:false}
      jwt:
        # JWT 서명 비밀키 (최소 32자 이상)
        secret: ${JWT_SECRET:docker-monitor-default-secret-key-change-in-production}
        # 토큰 만료 시간 (초, 기본 24시간)
        expiration-seconds: ${JWT_EXPIRATION:86400}
      user:
        # 기본 사용자명
        username: ${AUTH_USERNAME:admin}
        # 기본 비밀번호
        password: ${AUTH_PASSWORD:admin}

# 로깅 설정
logging:
  level:
    root: INFO
    com.example.dockermonitor: DEBUG
    com.github.dockerjava: WARN
    com.github.dockerjava.api.async.ResultCallbackTemplate: OFF
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
