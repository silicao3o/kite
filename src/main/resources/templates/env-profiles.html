<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23326ce5'/><path d='M16 5 L26 16 L16 22 L6 16 Z' fill='white' fill-opacity='0.95'/><path d='M16 22 L13.5 27 M16 22 L18.5 27' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-opacity='0.6'/><circle cx='16' cy='16' r='2' fill='%23326ce5'/></svg>">
    <title>kite · Env Profiles</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .add-form { background: var(--bg-card, #1e2a3a); border: 1px solid var(--border-color, #2d3f56); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: .75rem; align-items: end; }
        .form-group { display: flex; flex-direction: column; gap: .3rem; }
        .form-group label { font-size: .82rem; color: var(--text-secondary, #9aa0a6); }
        .form-group input, .form-group select { padding: .45rem .7rem; border: 1px solid var(--border-color, #2d3f56); border-radius: 6px; background: var(--bg-tertiary, #243044); color: var(--text-primary, #e8eaed); font-size: .9rem; width: 100%; box-sizing: border-box; }
        .section-title { font-weight: 600; margin-bottom: .75rem; color: var(--text-primary, #e8eaed); }
        .btn-add { padding: .45rem 1.1rem; background: var(--accent-blue, #3b82f6); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: .9rem; }
        .btn-add:hover { opacity: .9; }
        .btn-sm { padding: .3rem .65rem; border-radius: 6px; cursor: pointer; font-size: .78rem; border: 1px solid; background: transparent; white-space: nowrap; }
        .btn-edit { border-color: #6366f1; color: #a5b4fc; }
        .btn-edit:hover { background: rgba(99,102,241,.1); }
        .btn-delete { border-color: #f87171; color: #fca5a5; }
        .btn-delete:hover { background: rgba(239,68,68,.1); }
        .btn-group { display: flex; gap: .4rem; flex-wrap: wrap; }
        .table-wrap { overflow-x: auto; }
        .profile-table { width: 100%; border-collapse: collapse; margin-top: .5rem; min-width: 500px; }
        .profile-table th, .profile-table td { padding: .6rem .75rem; border-bottom: 1px solid var(--border-color, #2d3f56); text-align: left; font-size: .85rem; }
        .profile-table th { font-weight: 600; color: var(--text-secondary, #9aa0a6); font-size: .75rem; text-transform: uppercase; }
        .profile-table tr:hover td { background: var(--bg-tertiary, #243044); }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: .76rem; font-weight: 500; display: inline-block; }
        .badge-db { background: rgba(59,130,246,.15); color: #93c5fd; }
        .badge-secret { background: rgba(239,68,68,.15); color: #fca5a5; font-size: .72rem; }
        .badge-plain { background: rgba(34,197,94,.15); color: #86efac; font-size: .72rem; }
        .text-muted { color: var(--text-secondary, #9aa0a6); font-size: .82rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary, #9aa0a6); }
        .info-box { background: rgba(59,130,246,.08); border-left: 3px solid var(--accent-blue, #3b82f6); padding: .9rem 1.1rem; margin-bottom: 1.5rem; border-radius: 6px; font-size: .88rem; color: #93c5fd; }
        .info-box strong { color: #bfdbfe; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.7); z-index: 1000; overflow-y: auto; padding: 2vh 0; backdrop-filter: blur(3px); }
        .modal-content { background: var(--bg-card, #1e2a3a); border: 1px solid var(--border-color, #2d3f56); border-radius: 12px; max-width: 650px; width: 92%; margin: 0 auto; padding: 1.5rem; box-shadow: 0 20px 60px rgba(0,0,0,.5); color: var(--text-primary, #e8eaed); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-header h3 { margin: 0; font-size: 1.1rem; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary, #9aa0a6); }
        .modal-close:hover { color: var(--text-primary, #e8eaed); }

        .entry-list { margin-top: .5rem; }
        .entry-item { display: grid; grid-template-columns: 1fr 2fr auto; gap: .5rem; align-items: center; padding: .5rem 0; border-bottom: 1px solid var(--border-color, #2d3f56); font-size: .85rem; }
        .entry-key { font-family: monospace; font-weight: 600; color: var(--text-primary, #e8eaed); }
        .entry-value { font-family: monospace; color: var(--text-secondary, #9aa0a6); word-break: break-all; }

        /* Entries form */
        .entries-form { margin-top: 1rem; border-top: 1px solid var(--border-color, #2d3f56); padding-top: 1rem; }
        .entry-row { display: grid; grid-template-columns: 1fr 2fr auto auto; gap: .5rem; align-items: end; margin-bottom: .5rem; }
        .entry-row input { padding: .35rem .5rem; border: 1px solid var(--border-color, #2d3f56); border-radius: 4px; font-size: .85rem; width: 100%; box-sizing: border-box; background: var(--bg-tertiary, #243044); color: var(--text-primary, #e8eaed); }
        .entry-row label { font-size: .75rem; color: var(--text-muted); }

        /* Preset */
        .preset-select { margin-bottom: 1rem; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .entry-row { grid-template-columns: 1fr; }
            .modal-content { width: 96%; padding: 1rem; }
        }
    </style>
</head>
<body th:classappend="${embedded} ? 'embedded' : ''">
<style th:if="${embedded}">
    /* /deployments 탭 wrapper 안에서 iframe 으로 표시될 때 — sidebar / page-header / 햄버거 토글 모두 숨김 */
    .layout > aside { display: none !important; }
    .main-content { margin-left: 0 !important; padding: 1rem !important; }
    .main-content > .page-header { display: none !important; }
    .sidebar-toggle { display: none !important; }
    body { background: transparent; }
</style>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('env-profiles')}"></aside>

    <main class="main-content">
        <div class="page-header">
            <h2>Env Profiles</h2>
            <p>DB 접속 정보 프로파일 관리 — 컨테이너 생성 시 환경변수 자동 주입</p>
        </div>

        <div class="info-box">
            <strong>Env Profile</strong> — DB 접속 정보를 프로파일로 등록하면 컨테이너 배포 시 환경변수를 자동 주입합니다.
            secret 필드는 암호화 저장되며 API 응답에서 마스킹됩니다.
        </div>

        <div class="add-form">
            <div class="section-title">프로파일 생성</div>
            <div class="form-grid">
                <div class="form-group"><label>이름 *</label><input type="text" id="profileName" placeholder="db-operia-postgres" /></div>
                <div class="form-group"><label>설명</label><input type="text" id="profileDesc" placeholder="Operia PostgreSQL" /></div>
                <div class="form-group">
                    <label>프리셋</label>
                    <select id="preset" onchange="applyPreset()" style="padding:.45rem .7rem;border:1px solid var(--border-color,#2d3f56);border-radius:6px;background:var(--bg-tertiary,#243044);color:var(--text-primary,#e8eaed);font-size:.85rem;width:100%;">
                        <option value="">직접 입력</option>
                        <option value="postgres">PostgreSQL</option>
                        <option value="oracle">Oracle</option>
                        <option value="mssql">MSSQL</option>
                    </select>
                </div>
            </div>
            <div class="form-group" style="margin-top:.75rem;">
                <label>.env 내용 (KEY=VALUE 형식, 줄 단위)</label>
                <textarea id="envContent" placeholder="DB_HOST=112.187.198.214&#10;DB_PORT=5432&#10;DB_NAME=Operia&#10;DB_USERNAME=operia&#10;DB_PASSWORD=qwer1234!&#10;SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}" style="font-family:'JetBrains Mono',monospace,Consolas;font-size:.82rem;min-height:180px;resize:vertical;"></textarea>
            </div>
            <div style="margin-top:.5rem;font-size:.8rem;color:var(--text-secondary,#9aa0a6);">
                PASSWORD, SECRET, TOKEN이 포함된 키는 자동으로 secret 처리됩니다.
            </div>
            <div style="margin-top:1rem;">
                <button class="btn-add" onclick="createProfile()">프로파일 생성</button>
                <span id="createError" style="color:#fca5a5;font-size:.85rem;margin-left:.5rem;display:none;"></span>
            </div>
        </div>

        <div id="profileList">
            <div class="empty-state" id="emptyState" style="display:none;">등록된 프로파일이 없습니다.</div>
            <div class="table-wrap">
                <table class="profile-table" id="profileTable" style="display:none;">
                    <thead><tr><th>이름</th><th>타입</th><th>설명</th><th>생성일</th><th></th></tr></thead>
                    <tbody id="profileBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="detailTitle">프로파일 상세</h3>
            <button class="modal-close" onclick="closeDetail()">&times;</button>
        </div>
        <div id="detailEntries"></div>
    </div>
</div>

<script>
const PRESETS = {
    postgres: `DB_HOST=\nDB_PORT=5432\nDB_NAME=\nDB_USERNAME=\nDB_PASSWORD=\nSPRING_DATASOURCE_URL=jdbc:postgresql://\${DB_HOST}:\${DB_PORT}/\${DB_NAME}\nSPRING_DATASOURCE_DRIVER=org.postgresql.Driver\nHIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect`,
    oracle: `DB_HOST=\nDB_PORT=1521\nDB_NAME=\nDB_USERNAME=\nDB_PASSWORD=\nSPRING_DATASOURCE_URL=jdbc:oracle:thin:@\${DB_HOST}:\${DB_PORT}:\${DB_NAME}\nSPRING_DATASOURCE_DRIVER=oracle.jdbc.OracleDriver\nHIBERNATE_DIALECT=org.hibernate.dialect.OracleDialect`,
    mssql: `DB_HOST=\nDB_PORT=1433\nDB_NAME=\nDB_USERNAME=\nDB_PASSWORD=\nSPRING_DATASOURCE_URL=jdbc:sqlserver://\${DB_HOST}:\${DB_PORT};databaseName=\${DB_NAME}\nSPRING_DATASOURCE_DRIVER=com.microsoft.sqlserver.jdbc.SQLServerDriver\nHIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect`
};

const SECRET_KEYWORDS = ['PASSWORD', 'SECRET', 'TOKEN', 'KEY', 'CREDENTIAL'];

function applyPreset() {
    const preset = document.getElementById('preset').value;
    document.getElementById('envContent').value = preset ? PRESETS[preset] : '';
}

function isSecretKey(key) {
    const upper = key.toUpperCase();
    return SECRET_KEYWORDS.some(kw => upper.includes(kw));
}

function parseEnvContent(text) {
    return text.split('\n')
        .map(line => line.trim())
        .filter(line => line && !line.startsWith('#'))
        .map(line => {
            const idx = line.indexOf('=');
            if (idx <= 0) return null;
            const key = line.substring(0, idx).trim();
            const value = line.substring(idx + 1);
            return { key, value, secret: isSecretKey(key) };
        })
        .filter(e => e !== null);
}

async function createProfile() {
    const name = document.getElementById('profileName').value.trim();
    const errEl = document.getElementById('createError');
    if (!name) { errEl.textContent = '이름은 필수입니다.'; errEl.style.display = 'inline'; return; }

    const envText = document.getElementById('envContent').value.trim();
    if (!envText) { errEl.textContent = '.env 내용을 입력하세요.'; errEl.style.display = 'inline'; return; }
    errEl.style.display = 'none';

    const entries = parseEnvContent(envText);
    if (entries.length === 0) { errEl.textContent = '유효한 KEY=VALUE 항목이 없습니다.'; errEl.style.display = 'inline'; return; }

    const body = { name, type:'DATABASE', description: document.getElementById('profileDesc').value.trim(), entries };
    const res = await fetch('/api/env-profiles', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if (res.ok) {
        document.getElementById('profileName').value = '';
        document.getElementById('profileDesc').value = '';
        document.getElementById('envContent').value = '';
        document.getElementById('preset').value = '';
        loadProfiles();
    } else { errEl.textContent = '생성 실패: ' + await res.text(); errEl.style.display = 'inline'; }
}

async function loadProfiles() {
    const res = await fetch('/api/env-profiles');
    const profiles = await res.json();
    const table = document.getElementById('profileTable');
    const tbody = document.getElementById('profileBody');
    const empty = document.getElementById('emptyState');

    tbody.innerHTML = '';
    if (profiles.length === 0) { empty.style.display = 'block'; table.style.display = 'none'; return; }
    empty.style.display = 'none'; table.style.display = 'table';

    profiles.forEach(p => {
        const tr = document.createElement('tr');
        const created = p.createdAt ? new Date(p.createdAt).toLocaleDateString('ko-KR') : '-';
        tr.innerHTML = `
            <td><strong>${escapeHtml(p.name)}</strong></td>
            <td><span class="badge badge-db">${p.type}</span></td>
            <td><span class="text-muted">${escapeHtml(p.description||'-')}</span></td>
            <td class="text-muted">${created}</td>
            <td><div class="btn-group">
                <button class="btn-sm" style="border-color:var(--accent-blue,#3b82f6);color:#93c5fd;" onclick="viewDetail('${p.id}','${escapeHtml(p.name)}')">보기</button>
                <button class="btn-sm btn-edit" onclick="showDetail('${p.id}','${escapeHtml(p.name)}')">수정</button>
                <button class="btn-sm btn-delete" onclick="deleteProfile('${p.id}')">삭제</button>
            </div></td>`;
        tbody.appendChild(tr);
    });
}

let currentDetailId = null;

let detailEditMode = false;

async function viewDetail(id, name) {
    currentDetailId = id;
    detailEditMode = false;
    document.getElementById('detailTitle').textContent = name;
    document.getElementById('detailModal').style.display = 'block';

    const res = await fetch(`/api/env-profiles/${id}`);
    const data = await res.json();
    const entries = data.entries || [];
    const envText = entries.map(e => `${e.key}=${e.value || ''}`).join('\n');
    const container = document.getElementById('detailEntries');
    container.innerHTML = `
        <textarea id="viewEnvText" readonly style="
            font-family:'JetBrains Mono',Consolas,monospace;font-size:.82rem;
            width:100%;min-height:300px;resize:vertical;box-sizing:border-box;
            background:var(--bg-tertiary,#243044);color:var(--text-primary,#e8eaed);
            border:1px solid var(--border-color,#2d3f56);border-radius:6px;padding:.75rem;
            white-space:pre;overflow-x:auto;
        ">${escapeHtml(envText)}</textarea>
        <div style="margin-top:.5rem;display:flex;gap:.5rem;">
            <button class="btn-add" onclick="copyEnvText()" style="padding:.35rem .8rem;font-size:.8rem;">복사</button>
            <span id="copyMsg" style="color:#86efac;font-size:.82rem;display:none;">복사됨!</span>
        </div>`;
}

function copyEnvText() {
    const text = document.getElementById('viewEnvText').value;
    navigator.clipboard.writeText(text).then(() => {
        const msg = document.getElementById('copyMsg');
        msg.style.display = 'inline';
        setTimeout(() => msg.style.display = 'none', 2000);
    });
}

async function showDetail(id, name) {
    currentDetailId = id;
    detailEditMode = true;
    document.getElementById('detailTitle').textContent = name + ' — 수정';
    document.getElementById('detailModal').style.display = 'block';
    await loadDetailEntries(id);
}

async function loadDetailEntries(id) {
    const res = await fetch(`/api/env-profiles/${id}`);
    const data = await res.json();
    const entries = data.entries || [];
    const container = document.getElementById('detailEntries');

    let html = '<div class="entry-list">';
    if (entries.length === 0) {
        html += '<div class="empty-state" style="padding:1rem;">엔트리가 없습니다.</div>';
    } else {
        entries.forEach(e => {
            html += `<div class="entry-item" data-key="${escapeAttr(e.key)}">
                <span class="entry-key">${escapeHtml(e.key)}</span>
                <span class="entry-value">${escapeHtml(e.value||'')}</span>`;
            if (detailEditMode) {
                html += `<div class="btn-group">
                    <button class="btn-sm btn-edit" onclick="editEntry('${escapeAttr(e.key)}',${e.secret})">수정</button>
                    <button class="btn-sm btn-delete" onclick="deleteEntry('${escapeAttr(e.key)}')">삭제</button>
                </div>`;
            } else {
                html += `<span class="badge ${e.secret ? 'badge-secret' : 'badge-plain'}">${e.secret ? 'secret' : 'plain'}</span>`;
            }
            html += `</div>`;
        });
    }
    html += '</div>';
    if (detailEditMode) {
        html += `<div style="margin-top:1rem;border-top:1px solid var(--border-color,#2d3f56);padding-top:1rem;">
            <div style="font-size:.85rem;font-weight:600;margin-bottom:.5rem;">엔트리 추가</div>
            <div class="entry-row">
                <div class="form-group"><label>Key</label><input type="text" id="newEntryKey" placeholder="DB_HOST"/></div>
                <div class="form-group"><label>Value</label><input type="text" id="newEntryValue" placeholder="값"/></div>
                <div class="form-group"><label>Secret</label><input type="checkbox" id="newEntrySecret" style="width:auto;"/></div>
                <button class="btn-add" onclick="addNewEntry()" style="padding:.35rem .8rem;font-size:.8rem;">추가</button>
            </div>
            <span id="entryError" style="color:#fca5a5;font-size:.82rem;display:none;"></span>
        </div>`;
    }
    container.innerHTML = html;
}

async function editEntry(key, isSecret) {
    const newValue = prompt(`'${key}' 새 값을 입력하세요${isSecret ? ' (secret)' : ''}:`);
    if (newValue === null) return;
    await fetch(`/api/env-profiles/${currentDetailId}/entries/${encodeURIComponent(key)}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ value: newValue })
    });
    await loadDetailEntries(currentDetailId);
}

async function deleteEntry(key) {
    if (!confirm(`'${key}' 엔트리를 삭제하시겠습니까?`)) return;
    await fetch(`/api/env-profiles/${currentDetailId}/entries/${encodeURIComponent(key)}`, { method: 'DELETE' });
    await loadDetailEntries(currentDetailId);
}

async function addNewEntry() {
    const key = document.getElementById('newEntryKey').value.trim();
    const value = document.getElementById('newEntryValue').value;
    const secret = document.getElementById('newEntrySecret').checked;
    const errEl = document.getElementById('entryError');
    if (!key) { errEl.textContent = 'Key는 필수입니다.'; errEl.style.display = 'inline'; return; }
    errEl.style.display = 'none';

    const res = await fetch(`/api/env-profiles/${currentDetailId}/entries`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ key, value, secret })
    });
    if (res.ok) {
        document.getElementById('newEntryKey').value = '';
        document.getElementById('newEntryValue').value = '';
        document.getElementById('newEntrySecret').checked = false;
        await loadDetailEntries(currentDetailId);
    } else { errEl.textContent = '추가 실패'; errEl.style.display = 'inline'; }
}

function closeDetail() { document.getElementById('detailModal').style.display = 'none'; currentDetailId = null; }

async function deleteProfile(id) {
    if (!confirm('이 프로파일을 삭제하시겠습니까?')) return;
    await fetch(`/api/env-profiles/${id}`, { method: 'DELETE' });
    loadProfiles();
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s) { return String(s).replace(/"/g,'&quot;'); }

document.getElementById('detailModal').addEventListener('click', function(e) { if (e.target === this) closeDetail(); });
document.addEventListener('DOMContentLoaded', () => { loadProfiles(); });
</script>
<script src="/js/sidebar-toggle.js"></script>
</body>
</html>
