<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23326ce5'/><path d='M16 5 L26 16 L16 22 L6 16 Z' fill='white' fill-opacity='0.95'/><path d='M16 22 L13.5 27 M16 22 L18.5 27' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-opacity='0.6'/><circle cx='16' cy='16' r='2' fill='%23326ce5'/></svg>">
    <title>kite · Incident</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside th:replace="~{fragments/sidebar :: sidebar('incidents')}"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <a href="/incidents" style="text-decoration:none; color:inherit;">← Back to Incidents</a>
                <h2 th:text="${report.summary}">장애 요약</h2>
                <span class="status-badge"
                      th:classappend="${report.status.name() == 'OPEN'} ? 'exited' : (${report.status.name() == 'ANALYZING'} ? 'paused' : 'running')"
                      th:text="${report.status}">OPEN</span>
            </div>

            <!-- Basic Info -->
            <div class="table-card">
                <div class="table-header"><h3>Incident Information</h3></div>
                <div style="padding: 16px;">
                    <table style="width:100%; border-collapse:collapse;">
                        <tr>
                            <td style="padding:8px; font-weight:600; width:160px;">Container</td>
                            <td th:text="${report.containerName}" style="padding:8px;">web-server</td>
                        </tr>
                        <tr>
                            <td style="padding:8px; font-weight:600;">Container ID</td>
                            <td th:text="${report.containerId}" style="padding:8px;">abc123</td>
                        </tr>
                        <tr>
                            <td style="padding:8px; font-weight:600;">Occurred</td>
                            <td th:text="${#temporals.format(report.createdAt, 'yyyy-MM-dd HH:mm:ss')}" style="padding:8px;">2024-01-01 12:00:00</td>
                        </tr>
                        <tr th:if="${report.closedAt != null}">
                            <td style="padding:8px; font-weight:600;">Closed</td>
                            <td th:text="${#temporals.format(report.closedAt, 'yyyy-MM-dd HH:mm:ss')}" style="padding:8px;">2024-01-01 12:10:00</td>
                        </tr>
                    </table>
                </div>
            </div>

            <!-- Root Cause -->
            <div class="table-card" th:if="${report.rootCause != null}">
                <div class="table-header"><h3>Root Cause Analysis</h3></div>
                <div style="padding: 16px;">
                    <p th:text="${report.rootCause}" style="white-space:pre-wrap; line-height:1.6;">근본 원인</p>
                </div>
            </div>

            <!-- Suggestions -->
            <div class="table-card" th:if="${!report.suggestions.isEmpty()}">
                <div class="table-header"><h3>Prevention Suggestions</h3></div>
                <div style="padding: 16px;">
                    <ul style="margin:0; padding-left:20px; line-height:1.8;">
                        <li th:each="suggestion : ${report.suggestions}" th:text="${suggestion}">제안 사항</li>
                    </ul>
                </div>
            </div>

            <!-- Timeline -->
            <div class="table-card" th:if="${!report.timeline.isEmpty()}">
                <div class="table-header"><h3>Timeline</h3></div>
                <div style="padding: 16px;">
                    <ul style="margin:0; padding-left:20px; line-height:1.8;">
                        <li th:each="entry : ${report.timeline}" th:text="${entry}">타임라인 항목</li>
                    </ul>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/sidebar-toggle.js"></script>
</body>
</html>
