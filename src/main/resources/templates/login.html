<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kite</title>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-card: #1e2a3a;
            --border-color: #2d3f56;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent-blue: #326ce5;
            --accent-blue-hover: #4a7fe8;
            --status-exited: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 배경 그리드 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(50, 108, 229, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(50, 108, 229, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        /* 배경 글로우 */
        body::after {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(50, 108, 229, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        /* 로고 영역 */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            gap: 16px;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #326ce5, #1a4db5);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 32px rgba(50, 108, 229, 0.3);
        }

        .brand-logo svg {
            width: 32px;
            height: 32px;
        }

        .brand-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .brand-tagline {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: -10px;
            letter-spacing: 0.3px;
        }

        /* 카드 */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap svg {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 11px 12px 11px 38px;
            background: #151f2e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }

        .form-group input::placeholder { color: #4a5568; }

        .form-group input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(50, 108, 229, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: linear-gradient(135deg, #326ce5, #2558cc);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-box {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #f87171;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .error-box.visible { display: flex; }

        .error-box svg {
            flex-shrink: 0;
            width: 15px;
            height: 15px;
        }

        /* 하단 버전 */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="brand">
            <div class="brand-logo">
                <!-- kite 연 모양 로고 -->
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 3 L28 16 L16 24 L4 16 Z" fill="white" fill-opacity="0.95"/>
                    <path d="M16 24 L13 30 M16 24 L19 30" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.6"/>
                    <circle cx="16" cy="16" r="2.5" fill="#326ce5"/>
                    <path d="M4 16 L28 16" stroke="#326ce5" stroke-width="1" stroke-opacity="0.4"/>
                    <path d="M16 3 L16 24" stroke="#326ce5" stroke-width="1" stroke-opacity="0.4"/>
                </svg>
            </div>
            <div>
                <div class="brand-name">Kite</div>
                <div class="brand-tagline">Lightweight Container Orchestration</div>
            </div>
        </div>

        <div class="login-card">
            <div class="card-title">Sign in to your workspace</div>

            <div id="error-box" class="error-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="error-text">Invalid credentials</span>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="username" name="username"
                               placeholder="Enter username" required autofocus autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="password" name="password"
                               placeholder="Enter password" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="login-btn" id="submit-btn">Sign In</button>
            </form>
        </div>

        <div class="footer">kite · lite-k8s</div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');
            const errorText = document.getElementById('error-text');
            const btn = document.getElementById('submit-btn');

            errorBox.classList.remove('visible');
            btn.disabled = true;
            btn.textContent = 'Signing in…';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const data = await response.json().catch(() => ({}));
                    errorText.textContent = data.error || 'Invalid username or password';
                    errorBox.classList.add('visible');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch {
                errorText.textContent = 'Connection error. Please try again.';
                errorBox.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
