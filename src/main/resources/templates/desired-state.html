<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23326ce5'/><path d='M16 5 L26 16 L16 22 L6 16 Z' fill='white' fill-opacity='0.95'/><path d='M16 22 L13.5 27 M16 22 L18.5 27' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-opacity='0.6'/><circle cx='16' cy='16' r='2' fill='%23326ce5'/></svg>">
    <title>kite · Desired State</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .service-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .service-table th, .service-table td { padding: .65rem 1rem; border-bottom: 1px solid var(--border); text-align: left; font-size: .9rem; }
        .service-table th { font-weight: 600; color: var(--text-muted); font-size: .8rem; text-transform: uppercase; letter-spacing: .03em; }
        .service-table tr:hover td { background: var(--surface); }
        .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .form-row { display: flex; gap: .75rem; align-items: flex-end; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; gap: .3rem; }
        .form-group label { font-size: .82rem; color: var(--text-muted); }
        .form-group input { padding: .45rem .7rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: .9rem; width: 200px; }
        .form-group input[type=number] { width: 90px; }
        .btn-add { padding: .45rem 1.1rem; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: .9rem; }
        .btn-delete { padding: .3rem .75rem; background: transparent; border: 1px solid #f87171; color: #ef4444; border-radius: 6px; cursor: pointer; font-size: .8rem; }
        .btn-enable { padding: .3rem .75rem; background: transparent; border: 1px solid #34d399; color: #059669; border-radius: 6px; cursor: pointer; font-size: .8rem; }
        .badge-enabled { background: #d1fae5; color: #065f46; padding: 2px 10px; border-radius: 999px; font-size: .78rem; font-weight: 600; }
        .badge-disabled { background: #f3f4f6; color: #6b7280; padding: 2px 10px; border-radius: 999px; font-size: .78rem; font-weight: 600; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .section-title { font-weight: 600; margin-bottom: .75rem; }
        #addError { color: #ef4444; font-size: .85rem; margin-top: .5rem; display: none; }
    </style>
</head>
<body>
<div class="layout">
    <!-- Sidebar -->
    <aside th:replace="~{fragments/sidebar :: sidebar('desired-state')}"></aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h2>Desired State</h2>
            <p>선언적 컨테이너 수 관리 — DB에 저장된 서비스 스펙은 재시작 없이 즉시 적용됩니다</p>
        </div>

        <!-- 서비스 추가 폼 -->
        <div class="add-form">
            <div class="section-title">서비스 추가</div>
            <div class="form-row">
                <div class="form-group">
                    <label>서비스 이름</label>
                    <input type="text" id="svcName" placeholder="engine" />
                </div>
                <div class="form-group">
                    <label>이미지</label>
                    <input type="text" id="svcImage" placeholder="ghcr.io/myorg/engine:latest" style="width:280px;" />
                </div>
                <div class="form-group">
                    <label>Replicas</label>
                    <input type="number" id="svcReplicas" value="1" min="0" />
                </div>
                <div class="form-group">
                    <label>노드 이름 (선택)</label>
                    <input type="text" id="svcNodeName" placeholder="res (비워두면 로컬)" style="width:150px;" />
                </div>
                <button class="btn-add" onclick="addService()">추가</button>
            </div>
            <div id="addError"></div>
        </div>

        <!-- 서비스 목록 -->
        <div id="serviceList">
            <div class="empty-state" id="emptyState" style="display:none;">
                <p>등록된 서비스 스펙이 없습니다.</p>
                <p style="font-size:.85rem;">위 폼에서 서비스를 추가하면 다음 Reconcile 주기에 자동으로 컨테이너가 관리됩니다.</p>
            </div>
            <table class="service-table" id="serviceTable">
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>이미지</th>
                        <th>Replicas</th>
                        <th>컨테이너 Prefix</th>
                        <th>노드</th>
                        <th>상태</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="serviceTableBody"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
async function loadServices() {
    const res = await fetch('/api/desired-state/services');
    const services = await res.json();
    const tbody = document.getElementById('serviceTableBody');
    const emptyState = document.getElementById('emptyState');
    const table = document.getElementById('serviceTable');

    tbody.innerHTML = '';
    if (services.length === 0) {
        emptyState.style.display = 'block';
        table.style.display = 'none';
        return;
    }
    emptyState.style.display = 'none';
    table.style.display = 'table';

    services.forEach(s => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><strong>${s.name}</strong></td>
            <td style="font-size:.85rem; color:var(--text-muted);">${s.image}</td>
            <td>${s.replicas}</td>
            <td style="font-size:.85rem;">${s.containerNamePrefix || s.name}</td>
            <td>${s.nodeName ? `<span style="background:#ede9fe;color:#6d28d9;padding:2px 8px;border-radius:999px;font-size:.78rem;">${s.nodeName}</span>` : '<span style="color:var(--text-muted)">local</span>'}</td>
            <td><span class="${s.enabled ? 'badge-enabled' : 'badge-disabled'}">${s.enabled ? 'Active' : 'Disabled'}</span></td>
            <td>
                ${!s.enabled ? `<button class="btn-enable" onclick="enableService('${s.id}')">활성화</button> ` : ''}
                <button class="btn-delete" onclick="deleteService('${s.id}', '${s.name}')">삭제</button>
            </td>`;
        tbody.appendChild(tr);
    });
}

async function addService() {
    const name = document.getElementById('svcName').value.trim();
    const image = document.getElementById('svcImage').value.trim();
    const replicas = parseInt(document.getElementById('svcReplicas').value);
    const nodeName = document.getElementById('svcNodeName').value.trim() || null;
    const errEl = document.getElementById('addError');

    if (!name || !image) {
        errEl.style.display = 'block';
        errEl.textContent = '이름과 이미지는 필수입니다.';
        return;
    }
    errEl.style.display = 'none';

    const res = await fetch('/api/desired-state/services', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, image, replicas, nodeName })
    });

    if (res.ok) {
        document.getElementById('svcName').value = '';
        document.getElementById('svcImage').value = '';
        document.getElementById('svcReplicas').value = '1';
        document.getElementById('svcNodeName').value = '';
        loadServices();
    } else {
        const msg = await res.text();
        errEl.style.display = 'block';
        errEl.textContent = '추가 실패: ' + msg;
    }
}

async function deleteService(id, name) {
    if (!confirm(`"${name}" 서비스를 비활성화 하시겠습니까?\n(Soft delete — DB에서 enabled=false로 변경)`)) return;
    await fetch(`/api/desired-state/services/${id}`, { method: 'DELETE' });
    loadServices();
}

async function enableService(id) {
    await fetch(`/api/desired-state/services/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enable: true })
    });
    loadServices();
}

document.addEventListener('DOMContentLoaded', loadServices);
</script>
<script src="/js/sidebar-toggle.js"></script>
</body>
</html>
