<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23326ce5'/><path d='M16 5 L26 16 L16 22 L6 16 Z' fill='white' fill-opacity='0.95'/><path d='M16 22 L13.5 27 M16 22 L18.5 27' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-opacity='0.6'/><circle cx='16' cy='16' r='2' fill='%23326ce5'/></svg>">
    <title>kite · Nodes</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .node-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .node-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; }
        .node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .75rem; }
        .node-name { font-weight: 600; font-size: 1rem; }
        .node-address { color: var(--text-muted); font-size: .85rem; margin-bottom: .75rem; }
        .node-metrics { display: flex; gap: 1rem; font-size: .85rem; color: var(--text-muted); }
        .badge-healthy { background: #d1fae5; color: #065f46; padding: 2px 10px; border-radius: 999px; font-size: .78rem; font-weight: 600; }
        .badge-unhealthy { background: #fee2e2; color: #991b1b; padding: 2px 10px; border-radius: 999px; font-size: .78rem; font-weight: 600; }
        .badge-unknown { background: #f3f4f6; color: #6b7280; padding: 2px 10px; border-radius: 999px; font-size: .78rem; font-weight: 600; }
        .add-node-form { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .form-row { display: flex; gap: .75rem; align-items: flex-end; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; gap: .3rem; }
        .form-group label { font-size: .82rem; color: var(--text-muted); }
        .form-group input { padding: .45rem .7rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: .9rem; width: 180px; }
        .form-group input[type=number] { width: 90px; }
        .btn-add { padding: .45rem 1.1rem; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: .9rem; }
        .btn-remove { padding: .3rem .75rem; background: transparent; border: 1px solid #f87171; color: #ef4444; border-radius: 6px; cursor: pointer; font-size: .8rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    </style>
</head>
<body>
<div class="layout">
    <!-- Sidebar -->
    <aside th:replace="~{fragments/sidebar :: sidebar('nodes')}"></aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h2>Nodes</h2>
            <p>원격 Docker 호스트 등록 및 상태 관리</p>
        </div>

        <!-- 노드 추가 폼 -->
        <div class="add-node-form">
            <div style="font-weight:600; margin-bottom:.75rem;">노드 추가</div>
            <div class="form-row">
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" id="nodeName" placeholder="vm-b" />
                </div>
                <div class="form-group">
                    <label>호스트 (IP)</label>
                    <input type="text" id="nodeHost" placeholder="192.168.1.20" autocomplete="off" />
                </div>
                <div class="form-group" id="portGroup" style="display:none;">
                    <label>포트</label>
                    <input type="number" id="nodePort" value="2375" />
                </div>
                <div class="form-group">
                    <label>연결 방식</label>
                    <select id="connectionType" onchange="toggleSshFields()" style="padding:.45rem .7rem; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--text); font-size:.9rem;">
                        <option value="SSH">SSH 터널</option>
                        <option value="SSH_PROXY">SSH Proxy (CP 경유)</option>
                    </select>
                </div>
                <button class="btn-add" onclick="addNode()">추가</button>
            </div>
            <div id="sshFields" style="display:none; margin-top:.75rem;">
                <div class="form-row">
                    <div class="form-group">
                        <label>SSH 포트</label>
                        <input type="number" id="sshPort" value="22" />
                    </div>
                    <div class="form-group">
                        <label>SSH 유저</label>
                        <input type="text" id="sshUser" placeholder="ubuntu" style="width:130px;" autocomplete="off" />
                    </div>
                    <div class="form-group">
                        <label>인증 방식</label>
                        <select id="sshAuthType" onchange="toggleSshAuthFields()" style="padding:.45rem .7rem; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--text); font-size:.9rem;">
                            <option value="key">키 인증</option>
                            <option value="password">비밀번호 인증</option>
                        </select>
                    </div>
                </div>
                <div class="form-row" id="sshKeyFields">
                    <div class="form-group">
                        <label>SSH 키 경로 (컨테이너 내부)</label>
                        <input type="text" id="sshKeyPath" placeholder="/root/.ssh/id_rsa" style="width:220px;" />
                    </div>
                </div>
                <div class="form-row" id="sshPasswordFields" style="display:none;">
                    <div class="form-group">
                        <label>비밀번호</label>
                        <input type="password" id="sshPassword" placeholder="SSH 비밀번호" style="width:200px;" autocomplete="new-password" />
                    </div>
                </div>
            </div>
            <div id="addError" style="color:#ef4444; font-size:.85rem; margin-top:.5rem; display:none;"></div>
        </div>

        <!-- 노드 목록 -->
        <div th:if="${#lists.isEmpty(nodes)}" class="empty-state">
            <p>등록된 노드가 없습니다.</p>
            <p style="font-size:.85rem;">위 폼에서 원격 Docker 호스트 IP와 포트를 입력하면 모니터링 대상에 추가됩니다.</p>
        </div>

        <div class="node-grid" th:unless="${#lists.isEmpty(nodes)}">
            <div class="node-card" th:each="node : ${nodes}">
                <div class="node-header">
                    <span class="node-name" th:text="${node.name}">vm-b</span>
                    <span th:class="${node.status.name() == 'HEALTHY'} ? 'badge-healthy' : (${node.status.name() == 'UNHEALTHY'} ? 'badge-unhealthy' : 'badge-unknown')"
                          th:text="${node.status.name()}">UNKNOWN</span>
                </div>
                <div class="node-address">
                    <span th:if="${node.connectionType.name() == 'SSH'}">*.*.*.*</span>
                    <span th:if="${node.connectionType.name() == 'SSH_PROXY'}">*.*.*.*:[[${node.port}]]</span>
                    <span th:if="${node.connectionType.name() == 'SSH'}"
                          style="margin-left:.5rem; background:#ede9fe; color:#6d28d9; padding:1px 7px; border-radius:999px; font-size:.75rem; font-weight:600;">SSH</span>
                    <span th:if="${node.connectionType.name() == 'SSH_PROXY'}"
                          style="margin-left:.5rem; background:#fef3c7; color:#92400e; padding:1px 7px; border-radius:999px; font-size:.75rem; font-weight:600;">SSH_PROXY</span>
                </div>
                <div class="node-metrics">
                    <span>CPU: <strong th:text="${#numbers.formatDecimal(node.cpuUsagePercent, 1, 1) + '%'}">0.0%</strong></span>
                    <span>MEM: <strong th:text="${#numbers.formatDecimal(node.memoryUsagePercent, 1, 1) + '%'}">0.0%</strong></span>
                    <span>Containers: <strong th:text="${node.runningContainers}">0</strong></span>
                </div>
                <div style="margin-top:.75rem; text-align:right;">
                    <button class="btn-remove" th:data-node-id="${node.id}" onclick="removeNode(this.dataset.nodeId)">제거</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', toggleSshFields);

function toggleSshFields() {
    const val = document.getElementById('connectionType').value;
    const isSsh = val === 'SSH';
    document.getElementById('sshFields').style.display = isSsh ? 'block' : 'none';
    document.getElementById('portGroup').style.display = isSsh ? 'none' : '';
}

function toggleSshAuthFields() {
    const isPassword = document.getElementById('sshAuthType').value === 'password';
    document.getElementById('sshKeyFields').style.display = isPassword ? 'none' : '';
    document.getElementById('sshPasswordFields').style.display = isPassword ? '' : 'none';
}

async function addNode() {
    const name = document.getElementById('nodeName').value.trim();
    const host = document.getElementById('nodeHost').value.trim();
    const port = parseInt(document.getElementById('nodePort').value);
    const connectionType = document.getElementById('connectionType').value;
    const errEl = document.getElementById('addError');

    if (!name || !host) {
        errEl.textContent = '이름과 호스트를 입력하세요.';
        errEl.style.display = 'block';
        return;
    }

    const body = {name, host, connectionType};
    if (connectionType !== 'SSH') body.port = port;

    if (connectionType === 'SSH') {
        const sshUser = document.getElementById('sshUser').value.trim();
        const authType = document.getElementById('sshAuthType').value;
        if (!sshUser) {
            errEl.textContent = 'SSH 유저를 입력하세요.';
            errEl.style.display = 'block';
            return;
        }
        body.sshPort = parseInt(document.getElementById('sshPort').value);
        body.sshUser = sshUser;
        if (authType === 'password') {
            const sshPassword = document.getElementById('sshPassword').value;
            if (!sshPassword) {
                errEl.textContent = 'SSH 비밀번호를 입력하세요.';
                errEl.style.display = 'block';
                return;
            }
            body.sshPassword = sshPassword;
        } else {
            const sshKeyPath = document.getElementById('sshKeyPath').value.trim();
            if (!sshKeyPath) {
                errEl.textContent = 'SSH 키 경로를 입력하세요.';
                errEl.style.display = 'block';
                return;
            }
            body.sshKeyPath = sshKeyPath;
            // 패스프레이즈는 서버측 디폴트(NodeProperties.defaultSshPassphrase)로 자동 적용
        }
    }

    errEl.style.display = 'none';
    try {
        const res = await fetch('/api/nodes', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if (res.ok) {
            location.reload();
        } else {
            errEl.textContent = '노드 추가 실패: ' + res.status;
            errEl.style.display = 'block';
        }
    } catch (e) {
        errEl.textContent = '오류: ' + e.message;
        errEl.style.display = 'block';
    }
}

async function removeNode(id) {
    if (!confirm('노드를 제거하시겠습니까?')) return;
    await fetch('/api/nodes/' + id, {method: 'DELETE'});
    location.reload();
}
</script>
<script src="/js/sidebar-toggle.js"></script>
</body>
</html>
