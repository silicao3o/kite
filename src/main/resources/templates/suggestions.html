<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23326ce5'/><path d='M16 5 L26 16 L16 22 L6 16 Z' fill='white' fill-opacity='0.95'/><path d='M16 22 L13.5 27 M16 22 L18.5 27' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-opacity='0.6'/><circle cx='16' cy='16' r='2' fill='%23326ce5'/></svg>">
    <title>kite · Suggestions</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside th:replace="~{fragments/sidebar :: sidebar('suggestions')}"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h2>AI Suggestions</h2>
                <p>Pattern-based optimization suggestions</p>
            </div>

            <!-- Flash message -->
            <div th:if="${message}" class="pending-alert" style="border-left: 4px solid #2ecc71;">
                <p th:text="${message}"></p>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card" th:classappend="${pendingCount > 0} ? 'warning' : ''">
                    <div class="label">Pending</div>
                    <div class="value" th:text="${pendingCount}">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total</div>
                    <div class="value" th:text="${suggestions.size()}">0</div>
                </div>
            </div>

            <!-- Suggestions Table -->
            <div class="table-card">
                <div class="table-header">
                    <h3>Optimization Suggestions</h3>
                    <button onclick="location.reload()" class="refresh-btn">Refresh</button>
                </div>
                <div class="table-container">
                    <table th:if="${!suggestions.isEmpty()}">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Container</th>
                                <th>Type</th>
                                <th>Content</th>
                                <th>Occurrences</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="suggestion : ${suggestions}">
                                <td th:text="${#temporals.format(suggestion.createdAt, 'MM-dd HH:mm')}">01-01 12:00</td>
                                <td>
                                    <span class="container-name" th:text="${suggestion.containerName}">container</span>
                                </td>
                                <td>
                                    <span class="status-badge"
                                          th:classappend="${suggestion.type.name() == 'PLAYBOOK_IMPROVEMENT'} ? 'paused' : 'running'"
                                          th:text="${suggestion.type == T(com.lite_k8s.incident.Suggestion.Type).CONFIG_OPTIMIZATION} ? 'Config' : 'Playbook'">
                                        Config
                                    </span>
                                </td>
                                <td style="max-width:300px; white-space:pre-wrap; word-break:break-word;"
                                    th:text="${suggestion.content}">내용</td>
                                <td th:text="${suggestion.patternOccurrenceCount} + '회'">3회</td>
                                <td>
                                    <span class="status-badge"
                                          th:classappend="${suggestion.status.name() == 'PENDING'} ? 'paused' : (${suggestion.status.name() == 'APPROVED'} ? 'running' : 'exited')"
                                          th:text="${suggestion.status}">PENDING</span>
                                </td>
                                <td th:if="${suggestion.status.name() == 'PENDING'}">
                                    <form th:action="@{/suggestions/{id}/approve(id=${suggestion.id})}" method="post" style="display:inline">
                                        <button type="submit" class="action-btn" style="background:#2ecc71;color:white;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;">Approve</button>
                                    </form>
                                    <form th:action="@{/suggestions/{id}/reject(id=${suggestion.id})}" method="post" style="display:inline;margin-left:4px">
                                        <button type="submit" class="action-btn" style="background:#e74c3c;color:white;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;">Reject</button>
                                    </form>
                                </td>
                                <td th:if="${suggestion.status.name() != 'PENDING'}">-</td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${suggestions.isEmpty()}" class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                        <h3>No suggestions yet</h3>
                        <p>Suggestions will appear when repeated incident patterns are detected.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/sidebar-toggle.js"></script> 
</body>
</html>
