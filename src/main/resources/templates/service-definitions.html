<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23326ce5'/><path d='M16 5 L26 16 L16 22 L6 16 Z' fill='white' fill-opacity='0.95'/><path d='M16 22 L13.5 27 M16 22 L18.5 27' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-opacity='0.6'/><circle cx='16' cy='16' r='2' fill='%23326ce5'/></svg>">
    <title>kite · Service Definitions</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .add-form { background: var(--bg-card, #1e2a3a); border: 1px solid var(--border-color, #2d3f56); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: .75rem; align-items: end; }
        .form-group { display: flex; flex-direction: column; gap: .3rem; }
        .form-group label { font-size: .82rem; color: var(--text-secondary, #9aa0a6); }
        .form-group input, .form-group select, .form-group textarea { padding: .45rem .7rem; border: 1px solid var(--border-color, #2d3f56); border-radius: 6px; background: var(--bg-tertiary, #243044); color: var(--text-primary, #e8eaed); font-size: .9rem; width: 100%; box-sizing: border-box; }
        .form-group textarea { font-family: 'JetBrains Mono', monospace, Consolas; font-size: .82rem; resize: vertical; min-height: 200px; }
        .section-title { font-weight: 600; margin-bottom: .75rem; color: var(--text-primary, #e8eaed); }
        .btn-add { padding: .45rem 1.1rem; background: var(--accent-blue, #3b82f6); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: .9rem; }
        .btn-sm { padding: .3rem .65rem; border-radius: 6px; cursor: pointer; font-size: .78rem; border: 1px solid; background: transparent; white-space: nowrap; }
        .btn-edit { border-color: #6366f1; color: #a5b4fc; }
        .btn-edit:hover { background: rgba(99,102,241,.1); }
        .btn-deploy { border-color: #22c55e; color: #86efac; }
        .btn-deploy:hover { background: rgba(34,197,94,.1); }
        .btn-stop { border-color: #f59e0b; color: #fcd34d; }
        .btn-stop:hover { background: rgba(245,158,11,.1); }
        .btn-delete { border-color: #f87171; color: #fca5a5; }
        .btn-delete:hover { background: rgba(239,68,68,.1); }
        .btn-group { display: flex; gap: .4rem; flex-wrap: wrap; }
        .table-wrap { overflow-x: auto; }
        .svc-table { width: 100%; border-collapse: collapse; margin-top: .5rem; }
        .svc-table th, .svc-table td { padding: .6rem .75rem; border-bottom: 1px solid var(--border-color, #2d3f56); text-align: left; font-size: .85rem; }
        .svc-table th { font-weight: 600; color: var(--text-secondary, #9aa0a6); font-size: .75rem; text-transform: uppercase; }
        .svc-table tr:hover td { background: var(--bg-tertiary, #243044); }
        .badge { padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 600; }
        .badge-draft { background: rgba(107,114,128,.15); color: #9ca3af; }
        .badge-deployed { background: rgba(34,197,94,.15); color: #86efac; }
        .badge-stopped { background: rgba(245,158,11,.15); color: #fcd34d; }
        .text-muted { color: var(--text-secondary, #9aa0a6); font-size: .82rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary, #9aa0a6); }
        .mapping-row { display: flex; gap: .5rem; align-items: center; margin-bottom: .4rem; }
        .mapping-row select { flex: 1; padding: .4rem .6rem; border: 1px solid var(--border-color, #2d3f56); border-radius: 6px; background: var(--bg-tertiary, #243044); color: var(--text-primary, #e8eaed); font-size: .85rem; }
        .mapping-row .btn-remove { background: none; border: none; color: #f87171; cursor: pointer; font-size: 1.1rem; padding: 0 .3rem; }
        .mapping-tag { display: inline-flex; align-items: center; gap: .3rem; padding: 2px 8px; border-radius: 4px; font-size: .75rem; background: rgba(59,130,246,.1); color: #93c5fd; margin: 1px; }

        /* Modal — image-watches.html 와 동일 규칙 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.7); z-index: 1000; overflow-y: auto; padding: 2vh 0; backdrop-filter: blur(3px); }
        .modal-content { background: var(--bg-card, #1e2a3a); border: 1px solid var(--border-color, #2d3f56); border-radius: 12px; max-width: 650px; width: 92%; margin: 0 auto; padding: 1.5rem; box-shadow: 0 20px 60px rgba(0,0,0,.5); color: var(--text-primary, #e8eaed); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-header h3 { margin: 0; font-size: 1.1rem; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary, #9aa0a6); }
        .modal-close:hover { color: var(--text-primary, #e8eaed); }
        @media (max-width: 600px) {
            .modal-content { width: 96%; padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('service-definitions')}"></aside>

    <main class="main-content">
        <div class="page-header">
            <h2>Service Definitions</h2>
            <p>Docker Compose YAML을 DB로 관리 — 노드별 Env Profile을 매핑하여 Docker API로 배포</p>
        </div>

        <!-- 서비스 정의 등록 -->
        <div class="add-form">
            <div class="section-title">서비스 정의 등록</div>
            <div class="form-grid" style="grid-template-columns:1fr;">
                <div class="form-group"><label>이름 *</label><input type="text" id="defName" placeholder="quvi-operia"/></div>
            </div>
            <div style="margin-top:.75rem;">
                <label style="font-size:.82rem;color:var(--text-secondary,#9aa0a6);">노드별 Env Profile 매핑</label>
                <div id="defMappings" style="margin-top:.4rem;"></div>
                <button class="btn-sm btn-edit" onclick="addMappingRow('defMappings')" style="margin-top:.4rem;">+ 노드 추가</button>
            </div>
            <div class="form-group" style="margin-top:.75rem;">
                <label>Compose YAML *</label>
                <div style="display:flex;gap:.5rem;align-items:center;margin-bottom:.4rem;flex-wrap:wrap;">
                    <label style="display:inline-flex;align-items:center;gap:.3rem;font-size:.82rem;color:var(--text-secondary,#9aa0a6);">
                        <input type="radio" name="yamlSource" value="new" checked onchange="onYamlSourceChange()"/> 새로 작성
                    </label>
                    <label style="display:inline-flex;align-items:center;gap:.3rem;font-size:.82rem;color:var(--text-secondary,#9aa0a6);">
                        <input type="radio" name="yamlSource" value="preset" onchange="onYamlSourceChange()"/> 기존 정의에서 가져오기
                    </label>
                    <select id="defPresetSelect" style="display:none;padding:.35rem .55rem;border:1px solid var(--border-color,#2d3f56);border-radius:6px;background:var(--bg-tertiary,#243044);color:var(--text-primary,#e8eaed);font-size:.85rem;" onchange="loadPresetYaml()">
                        <option value="">— 정의 선택 —</option>
                    </select>
                </div>
                <textarea id="defYaml" placeholder="services:&#10;  app:&#10;    image: ghcr.io/org/app:latest&#10;    ports:&#10;      - '8080:8080'"></textarea>
            </div>
            <div style="margin-top:.75rem;">
                <button class="btn-add" onclick="createDef()">등록</button>
                <span id="defError" style="color:#fca5a5;font-size:.85rem;margin-left:.5rem;display:none;"></span>
            </div>
        </div>

        <div id="defList">
            <div class="empty-state" id="defEmpty" style="display:none;">등록된 서비스 정의가 없습니다.</div>
            <div class="table-wrap">
                <table class="svc-table" id="defTable" style="display:none;">
                    <thead><tr><th>이름</th><th>상태</th><th>노드 / Env Profile</th><th></th></tr></thead>
                    <tbody id="defBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editDefModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;overflow-y:auto;padding:2vh 0;backdrop-filter:blur(3px);">
    <div style="background:var(--bg-card,#1e2a3a);border:1px solid var(--border-color,#2d3f56);border-radius:12px;max-width:700px;width:92%;margin:0 auto;padding:1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.5);color:var(--text-primary,#e8eaed);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
            <h3 style="margin:0;font-size:1.1rem;">서비스 정의 수정</h3>
            <button onclick="closeEditDef()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-secondary,#9aa0a6);">&times;</button>
        </div>
        <input type="hidden" id="editDefId"/>
        <div style="display:flex;flex-direction:column;gap:.8rem;">
            <div class="form-group"><label>이름 *</label><input type="text" id="editDefName"/></div>
            <div>
                <label style="font-size:.82rem;color:var(--text-secondary,#9aa0a6);">노드별 Env Profile 매핑</label>
                <div id="editDefMappings" style="margin-top:.4rem;"></div>
                <button class="btn-sm btn-edit" onclick="addMappingRow('editDefMappings')" style="margin-top:.4rem;">+ 노드 추가</button>
            </div>
            <div class="form-group">
                <label>Compose YAML *</label>
                <textarea id="editDefYaml" style="font-family:'JetBrains Mono',monospace,Consolas;font-size:.82rem;min-height:250px;resize:vertical;"></textarea>
            </div>
            <div id="editDefError" style="color:#fca5a5;font-size:.85rem;display:none;"></div>
            <div style="display:flex;justify-content:flex-end;gap:.5rem;">
                <button class="btn-sm btn-delete" onclick="closeEditDef()">취소</button>
                <button class="btn-add" onclick="saveEditDef()">저장</button>
            </div>
        </div>
    </div>
</div>

<script>
let defsCache = [];
let profilesCache = [];
let nodesCache = [];

async function loadProfiles() {
    try {
        const res = await fetch('/api/env-profiles');
        profilesCache = await res.json();
    } catch(e) {}
}

async function loadNodes() {
    try {
        const res = await fetch('/api/nodes');
        nodesCache = await res.json();
    } catch(e) {}
}

function buildNodeOptions(selectedNode) {
    let html = '<option value="">로컬</option>';
    nodesCache.forEach(n => {
        const sel = n.name === selectedNode ? ' selected' : '';
        html += `<option value="${esc(n.name)}"${sel}>${esc(n.name)} (${esc(n.host)})</option>`;
    });
    return html;
}

function buildProfileOptions(selectedProfileId) {
    let html = '<option value="">없음</option>';
    profilesCache.forEach(p => {
        const sel = p.id === selectedProfileId ? ' selected' : '';
        html += `<option value="${esc(p.id)}"${sel}>${esc(p.name)}</option>`;
    });
    return html;
}

function addMappingRow(containerId, nodeName, profileId) {
    const container = document.getElementById(containerId);
    const row = document.createElement('div');
    row.className = 'mapping-row';
    row.innerHTML = `
        <select class="mapping-node">${buildNodeOptions(nodeName || '')}</select>
        <select class="mapping-profile">${buildProfileOptions(profileId || '')}</select>
        <button class="btn-remove" onclick="this.parentElement.remove()">&times;</button>
    `;
    container.appendChild(row);
}

function collectMappings(containerId) {
    const container = document.getElementById(containerId);
    const rows = container.querySelectorAll('.mapping-row');
    const mappings = {};
    rows.forEach(row => {
        const node = row.querySelector('.mapping-node').value;
        const profile = row.querySelector('.mapping-profile').value;
        if (node || profile) {
            mappings[node] = profile || null;
        }
    });
    return mappings;
}

function getProfileName(profileId) {
    if (!profileId) return null;
    const p = profilesCache.find(x => x.id === profileId);
    return p ? p.name : profileId.substring(0, 8);
}

function loadPresetSelect() {
    const sel = document.getElementById('defPresetSelect');
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = '<option value="">— 정의 선택 —</option>';
    defsCache.forEach(d => {
        const o = document.createElement('option');
        o.value = d.id;
        o.textContent = d.name;
        sel.appendChild(o);
    });
    if (current) sel.value = current;
}

function onYamlSourceChange() {
    const source = document.querySelector('input[name="yamlSource"]:checked').value;
    const presetSel = document.getElementById('defPresetSelect');
    const yaml = document.getElementById('defYaml');
    if (source === 'preset') {
        presetSel.style.display = 'inline-block';
        yaml.placeholder = '기존 정의를 선택하면 자동으로 채워집니다 (수정 가능)';
    } else {
        presetSel.style.display = 'none';
        presetSel.value = '';
        yaml.placeholder = "services:\n  app:\n    image: ghcr.io/org/app:latest\n    ports:\n      - '8080:8080'";
    }
}

function loadPresetYaml() {
    const presetId = document.getElementById('defPresetSelect').value;
    if (!presetId) return;
    const def = defsCache.find(d => d.id === presetId);
    if (def && def.composeYaml) {
        document.getElementById('defYaml').value = def.composeYaml;
    }
}

async function loadDefs() {
    const res = await fetch('/api/service-definitions');
    const defs = await res.json();
    defsCache = defs;
    loadPresetSelect();
    const table = document.getElementById('defTable');
    const tbody = document.getElementById('defBody');
    const empty = document.getElementById('defEmpty');
    tbody.innerHTML = '';
    if (defs.length === 0) { empty.style.display = 'block'; table.style.display = 'none'; return; }
    empty.style.display = 'none'; table.style.display = 'table';

    defs.forEach(d => {
        const tr = document.createElement('tr');
        const statusClass = d.status === 'DEPLOYED' ? 'badge-deployed' : d.status === 'STOPPED' ? 'badge-stopped' : 'badge-draft';

        // 노드별 매핑 표시
        let mappingHtml = '';
        const mappings = d.nodeEnvMappings || {};
        const keys = Object.keys(mappings);
        if (keys.length === 0) {
            mappingHtml = '<span class="text-muted">로컬 (프로파일 없음)</span>';
        } else {
            keys.forEach(node => {
                const profileName = getProfileName(mappings[node]);
                const nodeLabel = node || '로컬';
                mappingHtml += `<span class="mapping-tag">${esc(nodeLabel)}${profileName ? ' → ' + esc(profileName) : ''}</span>`;
            });
        }

        tr.innerHTML = `
            <td><strong>${esc(d.name)}</strong></td>
            <td><span class="badge ${statusClass}">${d.status}</span></td>
            <td>${mappingHtml}</td>
            <td><div class="btn-group">
                ${d.status === 'DEPLOYED' ? `<button class="btn-sm" style="border-color:#3b82f6;color:#93c5fd;" onclick="showContainerDetail('${d.id}','${esc(d.name)}')">상세</button>` : ''}
                ${d.status !== 'DEPLOYED' ? `<button class="btn-sm btn-deploy" onclick="deployDef('${d.id}',this)">배포</button>` : ''}
                ${d.status === 'DEPLOYED' ? `<button class="btn-sm btn-stop" onclick="stopDef('${d.id}',this)">중지</button>` : ''}
                <button class="btn-sm btn-edit" onclick="openEditDef('${d.id}')">수정</button>
                <button class="btn-sm btn-delete" onclick="deleteDef('${d.id}')">삭제</button>
            </div></td>`;
        tbody.appendChild(tr);
    });
}

async function createDef() {
    const name = document.getElementById('defName').value.trim();
    const composeYaml = document.getElementById('defYaml').value;
    const errEl = document.getElementById('defError');
    if (!name || !composeYaml.trim()) { errEl.textContent = '이름과 YAML은 필수입니다.'; errEl.style.display = 'inline'; return; }
    errEl.style.display = 'none';
    const nodeEnvMappings = collectMappings('defMappings');

    const res = await fetch('/api/service-definitions', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, composeYaml, nodeEnvMappings}) });
    if (res.ok) { document.getElementById('defName').value=''; document.getElementById('defYaml').value=''; document.getElementById('defMappings').innerHTML=''; loadDefs(); }
    else { errEl.textContent = '등록 실패: ' + await res.text(); errEl.style.display = 'inline'; }
}

async function deployDef(id, btn) {
    btn.disabled = true; btn.textContent = '배포 중...';
    const res = await fetch(`/api/service-definitions/${id}/deploy`, { method:'POST' });
    if (res.ok) { btn.textContent = '완료!'; setTimeout(loadDefs, 1000); }
    else { btn.textContent = '실패'; btn.disabled = false; }
}

async function stopDef(id, btn) {
    if (!confirm('서비스를 중지하시겠습니까?')) return;
    btn.disabled = true; btn.textContent = '중지 중...';
    const res = await fetch(`/api/service-definitions/${id}/stop`, { method:'POST' });
    if (res.ok) { btn.textContent = '완료!'; setTimeout(loadDefs, 1000); }
    else { btn.textContent = '실패'; btn.disabled = false; }
}

async function deleteDef(id) {
    if (!confirm('서비스 정의를 삭제하시겠습니까?')) return;
    await fetch(`/api/service-definitions/${id}`, { method:'DELETE' });
    loadDefs();
}

async function openEditDef(id) {
    const res = await fetch(`/api/service-definitions/${id}`);
    const data = await res.json();
    document.getElementById('editDefId').value = data.id;
    document.getElementById('editDefName').value = data.name || '';
    document.getElementById('editDefYaml').value = data.composeYaml || '';
    document.getElementById('editDefError').style.display = 'none';

    // 기존 매핑 행 구성
    const container = document.getElementById('editDefMappings');
    container.innerHTML = '';
    const mappings = data.nodeEnvMappings || {};
    Object.entries(mappings).forEach(([node, profileId]) => {
        addMappingRow('editDefMappings', node, profileId);
    });

    document.getElementById('editDefModal').style.display = 'block';
}

function closeEditDef() { document.getElementById('editDefModal').style.display = 'none'; }

async function saveEditDef() {
    const id = document.getElementById('editDefId').value;
    const name = document.getElementById('editDefName').value.trim();
    const composeYaml = document.getElementById('editDefYaml').value;
    const errEl = document.getElementById('editDefError');
    if (!name || !composeYaml.trim()) { errEl.textContent = '이름과 YAML은 필수입니다.'; errEl.style.display = 'inline'; return; }
    errEl.style.display = 'none';
    const nodeEnvMappings = collectMappings('editDefMappings');

    const res = await fetch(`/api/service-definitions/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, composeYaml, nodeEnvMappings}) });
    if (res.ok) { closeEditDef(); loadDefs(); }
    else { errEl.textContent = '수정 실패: ' + await res.text(); errEl.style.display = 'inline'; }
}

document.getElementById('editDefModal').addEventListener('click', function(e) { if (e.target === this) closeEditDef(); });

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function showContainerDetail(defId, defName) {
    document.getElementById('containerDetailTitle').textContent = defName + ' — 컨테이너';
    document.getElementById('containerDetailModal').style.display = 'block';
    const listEl = document.getElementById('containerDetailList');
    listEl.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--text-secondary);">로딩 중...</div>';

    const res = await fetch(`/api/service-definitions/${defId}/containers`);
    const containers = await res.json();

    if (containers.length === 0) {
        listEl.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--text-secondary);">컨테이너가 없습니다.</div>';
        return;
    }

    // 노드별 그룹핑
    const grouped = {};
    containers.forEach(c => {
        if (!grouped[c.nodeName]) grouped[c.nodeName] = [];
        grouped[c.nodeName].push(c);
    });

    listEl.innerHTML = Object.entries(grouped).map(([nodeName, conts]) => {
        const rows = conts.map(c => {
            const stateColor = c.state === 'running' ? '#22c55e' : '#f59e0b';
            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem .6rem;border-bottom:1px solid var(--border-color,#2d3f56);font-size:.85rem;">
                <div>
                    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${stateColor};margin-right:.4rem;"></span>
                    <strong>${esc(c.name)}</strong>
                    <span style="color:var(--text-secondary);font-size:.78rem;margin-left:.5rem;">${esc(c.image)}</span>
                </div>
                <div style="display:flex;gap:.3rem;">
                    ${c.state === 'running' ? `<button class="btn-sm btn-stop" onclick="containerAction('${defId}','${c.containerId}','stop',this)">Stop</button>` : ''}
                    <button class="btn-sm btn-edit" onclick="containerAction('${defId}','${c.containerId}','restart',this)">Restart</button>
                    <button class="btn-sm btn-deploy" onclick="containerAction('${defId}','${c.containerId}','redeploy',this)">Redeploy</button>
                </div>
            </div>`;
        }).join('');

        return `<div style="margin-bottom:.75rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem .6rem;background:var(--bg-tertiary,#243044);border-radius:6px 6px 0 0;font-size:.85rem;font-weight:600;">
                <span>${esc(nodeName)}</span>
                <div style="display:flex;gap:.3rem;">
                    <button class="btn-sm btn-stop" onclick="nodeAction('${defId}','${esc(nodeName)}','stop',this)" style="font-size:.72rem;">All Stop</button>
                    <button class="btn-sm btn-edit" onclick="nodeAction('${defId}','${esc(nodeName)}','restart',this)" style="font-size:.72rem;">All Restart</button>
                    <button class="btn-sm btn-deploy" onclick="nodeAction('${defId}','${esc(nodeName)}','redeploy',this)" style="font-size:.72rem;">All Redeploy</button>
                </div>
            </div>
            ${rows}
        </div>`;
    }).join('');
}

async function containerAction(defId, containerId, action, btn) {
    btn.disabled = true; const orig = btn.textContent; btn.textContent = '...';
    await fetch(`/api/service-definitions/${defId}/containers/${containerId}/${action}`, { method:'POST' });
    btn.textContent = orig; btn.disabled = false;
    showContainerDetail(defId, document.getElementById('containerDetailTitle').textContent.replace(' — 컨테이너', ''));
}

async function nodeAction(defId, nodeName, action, btn) {
    btn.disabled = true; const orig = btn.textContent; btn.textContent = '...';
    await fetch(`/api/service-definitions/${defId}/nodes/${encodeURIComponent(nodeName)}/${action}`, { method:'POST' });
    btn.textContent = orig; btn.disabled = false;
    showContainerDetail(defId, document.getElementById('containerDetailTitle').textContent.replace(' — 컨테이너', ''));
}

function closeContainerDetail() { document.getElementById('containerDetailModal').style.display = 'none'; }
document.addEventListener('DOMContentLoaded', () => { loadProfiles(); loadNodes(); loadDefs(); });
</script>

<!-- Container Detail Modal -->
<div class="modal-overlay" id="containerDetailModal" style="display:none;" onclick="if(event.target===this)closeContainerDetail()">
    <div class="modal-content" style="max-width:700px;">
        <div class="modal-header">
            <h3 id="containerDetailTitle">컨테이너 상세</h3>
            <button class="modal-close" onclick="closeContainerDetail()">&times;</button>
        </div>
        <div id="containerDetailList"></div>
    </div>
</div>

<script src="/js/sidebar-toggle.js"></script>
</body>
</html>
