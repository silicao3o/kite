<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23326ce5'/><path d='M16 5 L26 16 L16 22 L6 16 Z' fill='white' fill-opacity='0.95'/><path d='M16 22 L13.5 27 M16 22 L18.5 27' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-opacity='0.6'/><circle cx='16' cy='16' r='2' fill='%23326ce5'/></svg>">
    <title>kite · Service Definitions</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .add-form { background: var(--bg-card, #1e2a3a); border: 1px solid var(--border-color, #2d3f56); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: .75rem; align-items: end; }
        .form-group { display: flex; flex-direction: column; gap: .3rem; }
        .form-group label { font-size: .82rem; color: var(--text-secondary, #9aa0a6); }
        .form-group input, .form-group select, .form-group textarea { padding: .45rem .7rem; border: 1px solid var(--border-color, #2d3f56); border-radius: 6px; background: var(--bg-tertiary, #243044); color: var(--text-primary, #e8eaed); font-size: .9rem; width: 100%; box-sizing: border-box; }
        .form-group textarea { font-family: 'JetBrains Mono', monospace, Consolas; font-size: .82rem; resize: vertical; min-height: 200px; }
        .section-title { font-weight: 600; margin-bottom: .75rem; color: var(--text-primary, #e8eaed); }
        .btn-add { padding: .45rem 1.1rem; background: var(--accent-blue, #3b82f6); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: .9rem; }
        .btn-sm { padding: .3rem .65rem; border-radius: 6px; cursor: pointer; font-size: .78rem; border: 1px solid; background: transparent; white-space: nowrap; }
        .btn-edit { border-color: #6366f1; color: #a5b4fc; }
        .btn-edit:hover { background: rgba(99,102,241,.1); }
        .btn-deploy { border-color: #22c55e; color: #86efac; }
        .btn-deploy:hover { background: rgba(34,197,94,.1); }
        .btn-stop { border-color: #f59e0b; color: #fcd34d; }
        .btn-stop:hover { background: rgba(245,158,11,.1); }
        .btn-delete { border-color: #f87171; color: #fca5a5; }
        .btn-delete:hover { background: rgba(239,68,68,.1); }
        .btn-group { display: flex; gap: .4rem; flex-wrap: wrap; }
        .table-wrap { overflow-x: auto; }
        .svc-table { width: 100%; border-collapse: collapse; margin-top: .5rem; }
        .svc-table th, .svc-table td { padding: .6rem .75rem; border-bottom: 1px solid var(--border-color, #2d3f56); text-align: left; font-size: .85rem; }
        .svc-table th { font-weight: 600; color: var(--text-secondary, #9aa0a6); font-size: .75rem; text-transform: uppercase; }
        .svc-table tr:hover td { background: var(--bg-tertiary, #243044); }
        .badge { padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 600; }
        .badge-draft { background: rgba(107,114,128,.15); color: #9ca3af; }
        .badge-deployed { background: rgba(34,197,94,.15); color: #86efac; }
        .badge-stopped { background: rgba(245,158,11,.15); color: #fcd34d; }
        .text-muted { color: var(--text-secondary, #9aa0a6); font-size: .82rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary, #9aa0a6); }
        .info-box { background: rgba(59,130,246,.08); border-left: 3px solid var(--accent-blue, #3b82f6); padding: .9rem 1.1rem; margin-bottom: 1.5rem; border-radius: 6px; font-size: .88rem; color: #93c5fd; }
        .info-box strong { color: #bfdbfe; }
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('service-definitions')}"></aside>

    <main class="main-content">
        <div class="page-header">
            <h2>Service Definitions</h2>
            <p>Docker Compose YAML을 DB로 관리 — Env Profile과 조합하여 Docker API로 배포</p>
        </div>

        <!-- 빠른 배포 -->
        <div class="add-form" style="border-color:var(--accent-blue,#3b82f6);border-width:2px;">
            <div class="section-title">배포</div>
            <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr 1fr auto;">
                <div class="form-group">
                    <label>서비스 정의 *</label>
                    <select id="quickDef" style="padding:.45rem .7rem;border:1px solid var(--border-color,#2d3f56);border-radius:6px;background:var(--bg-tertiary,#243044);color:var(--text-primary,#e8eaed);font-size:.9rem;width:100%;"></select>
                </div>
                <div class="form-group">
                    <label>Env Profile</label>
                    <select id="quickProfile" style="padding:.45rem .7rem;border:1px solid var(--border-color,#2d3f56);border-radius:6px;background:var(--bg-tertiary,#243044);color:var(--text-primary,#e8eaed);font-size:.9rem;width:100%;">
                        <option value="">서비스 정의 설정 사용</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>노드 *</label>
                    <select id="quickNode" style="padding:.45rem .7rem;border:1px solid var(--border-color,#2d3f56);border-radius:6px;background:var(--bg-tertiary,#243044);color:var(--text-primary,#e8eaed);font-size:.9rem;width:100%;">
                        <option value="">로컬</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Compose Profiles</label>
                    <select id="quickProfiles" multiple style="padding:.45rem .7rem;border:1px solid var(--border-color,#2d3f56);border-radius:6px;background:var(--bg-tertiary,#243044);color:var(--text-primary,#e8eaed);font-size:.9rem;width:100%;min-height:60px;">
                    </select>
                </div>
                <div class="form-group" style="justify-content:flex-end;">
                    <label>&nbsp;</label>
                    <button class="btn-add" onclick="quickDeploy()" style="background:#22c55e;">배포</button>
                </div>
            </div>
            <span id="quickError" style="color:#fca5a5;font-size:.85rem;display:none;"></span>
            <span id="quickStatus" style="font-size:.85rem;margin-left:.5rem;"></span>
        </div>

        <!-- 서비스 정의 등록 -->
        <div class="add-form">
            <div class="section-title">서비스 정의 등록</div>
            <div class="form-grid">
                <div class="form-group"><label>이름 *</label><input type="text" id="defName" placeholder="quvi-operia"/></div>
                <div class="form-group"><label>Env Profile</label><select id="defProfile"><option value="">없음</option></select></div>
                <div class="form-group"><label>대상 노드</label><select id="defNodes" style="padding:.45rem .7rem;border:1px solid var(--border-color,#2d3f56);border-radius:6px;background:var(--bg-tertiary,#243044);color:var(--text-primary,#e8eaed);font-size:.9rem;width:100%;"><option value="">로컬</option></select></div>
            </div>
            <div class="form-group" style="margin-top:.75rem;">
                <label>Compose YAML *</label>
                <textarea id="defYaml" placeholder="services:&#10;  app:&#10;    image: ghcr.io/org/app:latest&#10;    ports:&#10;      - '8080:8080'"></textarea>
            </div>
            <div style="margin-top:.75rem;">
                <button class="btn-add" onclick="createDef()">등록</button>
                <span id="defError" style="color:#fca5a5;font-size:.85rem;margin-left:.5rem;display:none;"></span>
            </div>
        </div>

        <div id="defList">
            <div class="empty-state" id="defEmpty" style="display:none;">등록된 서비스 정의가 없습니다.</div>
            <div class="table-wrap">
                <table class="svc-table" id="defTable" style="display:none;">
                    <thead><tr><th>이름</th><th>상태</th><th>프로파일</th><th>노드</th><th></th></tr></thead>
                    <tbody id="defBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editDefModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;overflow-y:auto;padding:2vh 0;backdrop-filter:blur(3px);">
    <div style="background:var(--bg-card,#1e2a3a);border:1px solid var(--border-color,#2d3f56);border-radius:12px;max-width:700px;width:92%;margin:0 auto;padding:1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.5);color:var(--text-primary,#e8eaed);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
            <h3 style="margin:0;font-size:1.1rem;">서비스 정의 수정</h3>
            <button onclick="closeEditDef()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-secondary,#9aa0a6);">&times;</button>
        </div>
        <input type="hidden" id="editDefId"/>
        <div style="display:flex;flex-direction:column;gap:.8rem;">
            <div class="form-grid">
                <div class="form-group"><label>이름 *</label><input type="text" id="editDefName"/></div>
                <div class="form-group"><label>Env Profile</label><select id="editDefProfile"><option value="">없음</option></select></div>
                <div class="form-group"><label>대상 노드 (쉼표 구분)</label><input type="text" id="editDefNodes"/></div>
            </div>
            <div class="form-group">
                <label>Compose YAML *</label>
                <textarea id="editDefYaml" style="font-family:'JetBrains Mono',monospace,Consolas;font-size:.82rem;min-height:250px;resize:vertical;"></textarea>
            </div>
            <div id="editDefError" style="color:#fca5a5;font-size:.85rem;display:none;"></div>
            <div style="display:flex;justify-content:flex-end;gap:.5rem;">
                <button class="btn-sm btn-delete" onclick="closeEditDef()">취소</button>
                <button class="btn-add" onclick="saveEditDef()">저장</button>
            </div>
        </div>
    </div>
</div>

<script>
let defsCache = [];
let profilesCache = [];
let nodesCache = [];

async function loadProfiles() {
    try {
        const res = await fetch('/api/env-profiles');
        profilesCache = await res.json();
        // 등록 폼
        const sel = document.getElementById('defProfile');
        sel.innerHTML = '<option value="">없음</option>';
        profilesCache.forEach(p => { const o = document.createElement('option'); o.value = p.id; o.textContent = p.name; sel.appendChild(o); });
        // 빠른 배포
        const qSel = document.getElementById('quickProfile');
        qSel.innerHTML = '<option value="">서비스 정의 설정 사용</option>';
        profilesCache.forEach(p => { const o = document.createElement('option'); o.value = p.id; o.textContent = p.name; qSel.appendChild(o); });
    } catch(e) {}
}

async function loadNodes() {
    try {
        const res = await fetch('/api/nodes');
        nodesCache = await res.json();
        ['quickNode', 'defNodes'].forEach(selId => {
            const sel = document.getElementById(selId);
            sel.innerHTML = '<option value="">로컬</option>';
            nodesCache.forEach(n => { const o = document.createElement('option'); o.value = n.name; o.textContent = n.name + ' (' + n.host + ')'; sel.appendChild(o); });
        });
    } catch(e) {}
}

function loadQuickDefSelect() {
    const sel = document.getElementById('quickDef');
    sel.innerHTML = '<option value="">선택...</option>';
    defsCache.forEach(d => { const o = document.createElement('option'); o.value = d.id; o.textContent = d.name; sel.appendChild(o); });
    sel.addEventListener('change', loadQuickProfiles);
}

async function loadQuickProfiles() {
    const defId = document.getElementById('quickDef').value;
    const sel = document.getElementById('quickProfiles');
    sel.innerHTML = '';
    if (!defId) return;
    try {
        const res = await fetch(`/api/service-definitions/${defId}/profiles`);
        const profiles = await res.json();
        profiles.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; sel.appendChild(o); });
    } catch(e) {}
}

async function quickDeploy() {
    const defId = document.getElementById('quickDef').value;
    const errEl = document.getElementById('quickError');
    const statusEl = document.getElementById('quickStatus');
    if (!defId) { errEl.textContent = '서비스 정의를 선택하세요.'; errEl.style.display = 'inline'; return; }
    errEl.style.display = 'none';

    // 선택한 노드와 프로파일로 서비스 정의 업데이트 후 배포
    const profileId = document.getElementById('quickProfile').value || null;
    const nodeName = document.getElementById('quickNode').value;
    const nodeNames = nodeName ? [nodeName] : [];

    // 서비스 정의에 노드/프로파일 업데이트
    const updateBody = { nodeNames };
    if (profileId) updateBody.envProfileId = profileId;
    await fetch(`/api/service-definitions/${defId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(updateBody) });

    // 배포 — activeProfiles 파라미터 구성
    const profilesSel = document.getElementById('quickProfiles');
    const selectedProfiles = Array.from(profilesSel.selectedOptions).map(o => o.value);
    let deployUrl = `/api/service-definitions/${defId}/deploy`;
    if (selectedProfiles.length > 0) {
        const params = selectedProfiles.map(p => `activeProfiles=${encodeURIComponent(p)}`).join('&');
        deployUrl += `?${params}`;
    }

    statusEl.textContent = '배포 중...';
    statusEl.style.color = 'var(--text-secondary)';
    const res = await fetch(deployUrl, { method:'POST' });
    if (res.ok) {
        statusEl.textContent = '배포 완료!';
        statusEl.style.color = '#86efac';
        setTimeout(() => { statusEl.textContent = ''; loadDefs(); }, 2000);
    } else {
        const msg = await res.text();
        errEl.textContent = '배포 실패: ' + msg;
        errEl.style.display = 'inline';
        statusEl.textContent = '';
    }
}

async function loadDefs() {
    const res = await fetch('/api/service-definitions');
    const defs = await res.json();
    defsCache = defs;
    loadQuickDefSelect();
    const table = document.getElementById('defTable');
    const tbody = document.getElementById('defBody');
    const empty = document.getElementById('defEmpty');
    tbody.innerHTML = '';
    if (defs.length === 0) { empty.style.display = 'block'; table.style.display = 'none'; return; }
    empty.style.display = 'none'; table.style.display = 'table';

    defs.forEach(d => {
        const tr = document.createElement('tr');
        const statusClass = d.status === 'DEPLOYED' ? 'badge-deployed' : d.status === 'STOPPED' ? 'badge-stopped' : 'badge-draft';
        const nodes = d.nodeNames && d.nodeNames.length > 0 ? d.nodeNames.join(', ') : '<span class="text-muted">로컬</span>';
        tr.innerHTML = `
            <td><strong>${esc(d.name)}</strong></td>
            <td><span class="badge ${statusClass}">${d.status}</span></td>
            <td class="text-muted">${d.envProfileId || '-'}</td>
            <td>${nodes}</td>
            <td><div class="btn-group">
                ${d.status !== 'DEPLOYED' ? `<button class="btn-sm btn-deploy" onclick="deployDef('${d.id}',this)">배포</button>` : ''}
                ${d.status === 'DEPLOYED' ? `<button class="btn-sm btn-stop" onclick="stopDef('${d.id}',this)">중지</button>` : ''}
                <button class="btn-sm btn-edit" onclick="openEditDef('${d.id}')">수정</button>
                <button class="btn-sm btn-delete" onclick="deleteDef('${d.id}')">삭제</button>
            </div></td>`;
        tbody.appendChild(tr);
    });
}

async function createDef() {
    const name = document.getElementById('defName').value.trim();
    const composeYaml = document.getElementById('defYaml').value;
    const errEl = document.getElementById('defError');
    if (!name || !composeYaml.trim()) { errEl.textContent = '이름과 YAML은 필수입니다.'; errEl.style.display = 'inline'; return; }
    errEl.style.display = 'none';
    const envProfileId = document.getElementById('defProfile').value || null;
    const nodeName = document.getElementById('defNodes').value;
    const nodeNames = nodeName ? [nodeName] : [];

    const res = await fetch('/api/service-definitions', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, composeYaml, envProfileId, nodeNames}) });
    if (res.ok) { document.getElementById('defName').value=''; document.getElementById('defYaml').value=''; document.getElementById('defNodes').value=''; loadDefs(); }
    else { errEl.textContent = '등록 실패: ' + await res.text(); errEl.style.display = 'inline'; }
}

async function deployDef(id, btn) {
    btn.disabled = true; btn.textContent = '배포 중...';
    const res = await fetch(`/api/service-definitions/${id}/deploy`, { method:'POST' });
    if (res.ok) { btn.textContent = '완료!'; setTimeout(loadDefs, 1000); }
    else { btn.textContent = '실패'; btn.disabled = false; }
}

async function stopDef(id, btn) {
    if (!confirm('서비스를 중지하시겠습니까?')) return;
    btn.disabled = true; btn.textContent = '중지 중...';
    const res = await fetch(`/api/service-definitions/${id}/stop`, { method:'POST' });
    if (res.ok) { btn.textContent = '완료!'; setTimeout(loadDefs, 1000); }
    else { btn.textContent = '실패'; btn.disabled = false; }
}

async function deleteDef(id) {
    if (!confirm('서비스 정의를 삭제하시겠습니까?')) return;
    await fetch(`/api/service-definitions/${id}`, { method:'DELETE' });
    loadDefs();
}

async function openEditDef(id) {
    const d = defsCache.find(x => x.id === id);
    if (!d) return;
    // 상세 조회로 YAML 가져오기
    const res = await fetch(`/api/service-definitions/${id}`);
    const data = await res.json();
    document.getElementById('editDefId').value = data.id;
    document.getElementById('editDefName').value = data.name || '';
    document.getElementById('editDefYaml').value = data.composeYaml || '';
    document.getElementById('editDefNodes').value = (data.nodeNames || []).join(', ');
    document.getElementById('editDefError').style.display = 'none';

    // 프로파일 select 채우기
    const sel = document.getElementById('editDefProfile');
    sel.innerHTML = '<option value="">없음</option>';
    try {
        const pRes = await fetch('/api/env-profiles');
        const profiles = await pRes.json();
        profiles.forEach(p => { const o = document.createElement('option'); o.value = p.id; o.textContent = p.name; if (p.id === data.envProfileId) o.selected = true; sel.appendChild(o); });
    } catch(e) {}

    document.getElementById('editDefModal').style.display = 'block';
}

function closeEditDef() { document.getElementById('editDefModal').style.display = 'none'; }

async function saveEditDef() {
    const id = document.getElementById('editDefId').value;
    const name = document.getElementById('editDefName').value.trim();
    const composeYaml = document.getElementById('editDefYaml').value;
    const errEl = document.getElementById('editDefError');
    if (!name || !composeYaml.trim()) { errEl.textContent = '이름과 YAML은 필수입니다.'; errEl.style.display = 'inline'; return; }
    errEl.style.display = 'none';
    const envProfileId = document.getElementById('editDefProfile').value || null;
    const nodeNamesStr = document.getElementById('editDefNodes').value.trim();
    const nodeNames = nodeNamesStr ? nodeNamesStr.split(',').map(s => s.trim()).filter(s => s) : [];

    const res = await fetch(`/api/service-definitions/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, composeYaml, envProfileId, nodeNames}) });
    if (res.ok) { closeEditDef(); loadDefs(); }
    else { errEl.textContent = '수정 실패: ' + await res.text(); errEl.style.display = 'inline'; }
}

document.getElementById('editDefModal').addEventListener('click', function(e) { if (e.target === this) closeEditDef(); });

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('DOMContentLoaded', () => { loadProfiles(); loadNodes(); loadDefs(); });
</script>
<script src="/js/sidebar-toggle.js"></script>
</body>
</html>
