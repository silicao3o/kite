<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23326ce5'/><path d='M16 5 L26 16 L16 22 L6 16 Z' fill='white' fill-opacity='0.95'/><path d='M16 22 L13.5 27 M16 22 L18.5 27' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-opacity='0.6'/><circle cx='16' cy='16' r='2' fill='%23326ce5'/></svg>">
    <title>kite · Service Definitions</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .add-form { background: var(--bg-card, #1e2a3a); border: 1px solid var(--border-color, #2d3f56); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: .75rem; align-items: end; }
        .form-group { display: flex; flex-direction: column; gap: .3rem; }
        .form-group label { font-size: .82rem; color: var(--text-secondary, #9aa0a6); }
        .form-group input, .form-group select, .form-group textarea { padding: .45rem .7rem; border: 1px solid var(--border-color, #2d3f56); border-radius: 6px; background: var(--bg-tertiary, #243044); color: var(--text-primary, #e8eaed); font-size: .9rem; width: 100%; box-sizing: border-box; }
        .form-group textarea { font-family: 'JetBrains Mono', monospace, Consolas; font-size: .82rem; resize: vertical; min-height: 200px; }
        .section-title { font-weight: 600; margin-bottom: .75rem; color: var(--text-primary, #e8eaed); }
        .btn-add { padding: .45rem 1.1rem; background: var(--accent-blue, #3b82f6); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: .9rem; }
        .btn-sm { padding: .3rem .65rem; border-radius: 6px; cursor: pointer; font-size: .78rem; border: 1px solid; background: transparent; white-space: nowrap; }
        .btn-deploy { border-color: #22c55e; color: #86efac; }
        .btn-deploy:hover { background: rgba(34,197,94,.1); }
        .btn-stop { border-color: #f59e0b; color: #fcd34d; }
        .btn-stop:hover { background: rgba(245,158,11,.1); }
        .btn-delete { border-color: #f87171; color: #fca5a5; }
        .btn-delete:hover { background: rgba(239,68,68,.1); }
        .btn-group { display: flex; gap: .4rem; flex-wrap: wrap; }
        .table-wrap { overflow-x: auto; }
        .svc-table { width: 100%; border-collapse: collapse; margin-top: .5rem; }
        .svc-table th, .svc-table td { padding: .6rem .75rem; border-bottom: 1px solid var(--border-color, #2d3f56); text-align: left; font-size: .85rem; }
        .svc-table th { font-weight: 600; color: var(--text-secondary, #9aa0a6); font-size: .75rem; text-transform: uppercase; }
        .svc-table tr:hover td { background: var(--bg-tertiary, #243044); }
        .badge { padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 600; }
        .badge-draft { background: rgba(107,114,128,.15); color: #9ca3af; }
        .badge-deployed { background: rgba(34,197,94,.15); color: #86efac; }
        .badge-stopped { background: rgba(245,158,11,.15); color: #fcd34d; }
        .text-muted { color: var(--text-secondary, #9aa0a6); font-size: .82rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary, #9aa0a6); }
        .info-box { background: rgba(59,130,246,.08); border-left: 3px solid var(--accent-blue, #3b82f6); padding: .9rem 1.1rem; margin-bottom: 1.5rem; border-radius: 6px; font-size: .88rem; color: #93c5fd; }
        .info-box strong { color: #bfdbfe; }
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('service-definitions')}"></aside>

    <main class="main-content">
        <div class="page-header">
            <h2>Service Definitions</h2>
            <p>Docker Compose YAML을 DB로 관리 — Env Profile과 조합하여 Docker API로 배포</p>
        </div>

        <div class="info-box">
            <strong>Service Definition</strong> — compose YAML + Env Profile + 대상 노드를 등록하면 Kite가 Docker API로 직접 컨테이너를 생성합니다. 서버에 파일 불필요.
        </div>

        <div class="add-form">
            <div class="section-title">서비스 정의 추가</div>
            <div class="form-grid">
                <div class="form-group"><label>이름 *</label><input type="text" id="defName" placeholder="quvi-operia"/></div>
                <div class="form-group"><label>Env Profile</label><select id="defProfile"><option value="">없음</option></select></div>
                <div class="form-group"><label>대상 노드 (쉼표 구분)</label><input type="text" id="defNodes" placeholder="gcp-operia"/></div>
            </div>
            <div class="form-group" style="margin-top:.75rem;">
                <label>Compose YAML *</label>
                <textarea id="defYaml" placeholder="services:&#10;  app:&#10;    image: ghcr.io/org/app:latest&#10;    ports:&#10;      - '8080:8080'"></textarea>
            </div>
            <div style="margin-top:.75rem;">
                <button class="btn-add" onclick="createDef()">등록</button>
                <span id="defError" style="color:#fca5a5;font-size:.85rem;margin-left:.5rem;display:none;"></span>
            </div>
        </div>

        <div id="defList">
            <div class="empty-state" id="defEmpty" style="display:none;">등록된 서비스 정의가 없습니다.</div>
            <div class="table-wrap">
                <table class="svc-table" id="defTable" style="display:none;">
                    <thead><tr><th>이름</th><th>상태</th><th>프로파일</th><th>노드</th><th></th></tr></thead>
                    <tbody id="defBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
async function loadProfiles() {
    try {
        const res = await fetch('/api/env-profiles');
        const profiles = await res.json();
        const sel = document.getElementById('defProfile');
        profiles.forEach(p => { const o = document.createElement('option'); o.value = p.id; o.textContent = p.name; sel.appendChild(o); });
    } catch(e) {}
}

async function loadDefs() {
    const res = await fetch('/api/service-definitions');
    const defs = await res.json();
    const table = document.getElementById('defTable');
    const tbody = document.getElementById('defBody');
    const empty = document.getElementById('defEmpty');
    tbody.innerHTML = '';
    if (defs.length === 0) { empty.style.display = 'block'; table.style.display = 'none'; return; }
    empty.style.display = 'none'; table.style.display = 'table';

    defs.forEach(d => {
        const tr = document.createElement('tr');
        const statusClass = d.status === 'DEPLOYED' ? 'badge-deployed' : d.status === 'STOPPED' ? 'badge-stopped' : 'badge-draft';
        const nodes = d.nodeNames && d.nodeNames.length > 0 ? d.nodeNames.join(', ') : '<span class="text-muted">로컬</span>';
        tr.innerHTML = `
            <td><strong>${esc(d.name)}</strong></td>
            <td><span class="badge ${statusClass}">${d.status}</span></td>
            <td class="text-muted">${d.envProfileId || '-'}</td>
            <td>${nodes}</td>
            <td><div class="btn-group">
                ${d.status !== 'DEPLOYED' ? `<button class="btn-sm btn-deploy" onclick="deployDef('${d.id}',this)">배포</button>` : ''}
                ${d.status === 'DEPLOYED' ? `<button class="btn-sm btn-stop" onclick="stopDef('${d.id}',this)">중지</button>` : ''}
                <button class="btn-sm btn-delete" onclick="deleteDef('${d.id}')">삭제</button>
            </div></td>`;
        tbody.appendChild(tr);
    });
}

async function createDef() {
    const name = document.getElementById('defName').value.trim();
    const composeYaml = document.getElementById('defYaml').value;
    const errEl = document.getElementById('defError');
    if (!name || !composeYaml.trim()) { errEl.textContent = '이름과 YAML은 필수입니다.'; errEl.style.display = 'inline'; return; }
    errEl.style.display = 'none';
    const envProfileId = document.getElementById('defProfile').value || null;
    const nodeNamesStr = document.getElementById('defNodes').value.trim();
    const nodeNames = nodeNamesStr ? nodeNamesStr.split(',').map(s => s.trim()).filter(s => s) : [];

    const res = await fetch('/api/service-definitions', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, composeYaml, envProfileId, nodeNames}) });
    if (res.ok) { document.getElementById('defName').value=''; document.getElementById('defYaml').value=''; document.getElementById('defNodes').value=''; loadDefs(); }
    else { errEl.textContent = '등록 실패: ' + await res.text(); errEl.style.display = 'inline'; }
}

async function deployDef(id, btn) {
    btn.disabled = true; btn.textContent = '배포 중...';
    const res = await fetch(`/api/service-definitions/${id}/deploy`, { method:'POST' });
    if (res.ok) { btn.textContent = '완료!'; setTimeout(loadDefs, 1000); }
    else { btn.textContent = '실패'; btn.disabled = false; }
}

async function stopDef(id, btn) {
    if (!confirm('서비스를 중지하시겠습니까?')) return;
    btn.disabled = true; btn.textContent = '중지 중...';
    const res = await fetch(`/api/service-definitions/${id}/stop`, { method:'POST' });
    if (res.ok) { btn.textContent = '완료!'; setTimeout(loadDefs, 1000); }
    else { btn.textContent = '실패'; btn.disabled = false; }
}

async function deleteDef(id) {
    if (!confirm('서비스 정의를 삭제하시겠습니까?')) return;
    await fetch(`/api/service-definitions/${id}`, { method:'DELETE' });
    loadDefs();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('DOMContentLoaded', () => { loadProfiles(); loadDefs(); });
</script>
<script src="/js/sidebar-toggle.js"></script>
</body>
</html>
