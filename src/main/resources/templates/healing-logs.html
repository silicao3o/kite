<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23326ce5'/><path d='M16 5 L26 16 L16 22 L6 16 Z' fill='white' fill-opacity='0.95'/><path d='M16 22 L13.5 27 M16 22 L18.5 27' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-opacity='0.6'/><circle cx='16' cy='16' r='2' fill='%23326ce5'/></svg>">
    <title>kite · Healing Logs</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside th:replace="~{fragments/sidebar :: sidebar('healing-logs')}"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h2>Self Healing Logs</h2>
                <p>Container auto-restart history</p>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card" th:classappend="${healingEnabled} ? 'healing' : ''">
                    <div class="label">Self Healing</div>
                    <div class="value" th:text="${healingEnabled} ? 'ON' : 'OFF'">OFF</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total Events</div>
                    <div class="value" th:text="${events.size()}">0</div>
                </div>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-bar">
                <a href="/healing-logs" class="filter-btn" th:classappend="${successFilter == null} ? 'active' : ''">All</a>
                <a href="/healing-logs?success=true" class="filter-btn" th:classappend="${successFilter != null && successFilter} ? 'active' : ''">Success</a>
                <a href="/healing-logs?success=false" class="filter-btn" th:classappend="${successFilter != null && !successFilter} ? 'active' : ''">Failed</a>
            </div>

            <!-- Events Table -->
            <div class="table-card">
                <div class="table-header">
                    <h3>Recent Healing Events</h3>
                    <button onclick="location.reload()" class="refresh-btn">Refresh</button>
                </div>
                <div class="table-container">
                    <table th:if="${!events.isEmpty()}">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Container</th>
                                <th>Status</th>
                                <th>Restart #</th>
                                <th>Message</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="event : ${events}">
                                <td th:text="${#temporals.format(event.timestamp, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 12:00:00</td>
                                <td>
                                    <span class="container-name" th:text="${event.containerName}">container-name</span>
                                    <span class="container-id" th:text="${event.containerId.substring(0, 12)}">abc123</span>
                                </td>
                                <td>
                                    <span class="status-badge"
                                          th:classappend="${event.success} ? 'running' : 'exited'"
                                          th:text="${event.success} ? 'SUCCESS' : 'FAILED'">SUCCESS</span>
                                </td>
                                <td th:text="${event.restartCount}">1</td>
                                <td th:text="${event.message}">자가치유 성공</td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${events.isEmpty()}" class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                        </svg>
                        <h3>No healing events</h3>
                        <p>No self-healing events have occurred yet.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/sidebar-toggle.js"></script>
</body>
</html>
